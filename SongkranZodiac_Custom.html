<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ดวงปีนักษัตร สงกรานต์ — Custom Designer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;700;900&family=Srisakdi:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Shared */
      --gold: #e8c84a;
      --gold2: #fff3a0;
      --gold3: #b8941a;
      --red: #ff3a2f;
      --font-main: 'Noto Serif Thai', serif;
      --font-title: 'Srisakdi', cursive;
      
      /* Theme Dependent (Defaults to Sacred Dark) */
      --bg: #03010a;
      --text: #f0e6c8;
      --ctrl-bg: rgba(18,10,36,0.75);
      --ctrl-border: var(--gold3);
      --card-bg: rgba(8,4,22,0.88);
      --card-border: rgba(232,200,74,0.3);
      --mandala-op: 0.15;

      --wheel-disc1: #0e0826;
      --wheel-disc2: #04020e;
      --center-disc1: #1e1044;
      --center-disc2: #050210;
    }

    /* ── Solar Light Theme ── */
    body.theme-solar {
      --bg: #ffffff;
      --text: #000000;
      --ctrl-bg: #f5f5f5;
      --ctrl-border: #999999;
      --card-bg: rgba(245,245,245,0.98);

      --card-border: rgba(0,0,0,0.3);
      --mandala-op: 0.25;
      --wheel-disc1: #ffffff;
      --wheel-disc2: #f5f5f5;
      --center-disc1: #ffffff;
      --center-disc2: #eeeeee;
      --gold: #111111;
      --gold2: #000000;
      --gold3: #222222;
    }


    body.theme-solar .main-title,
    body.theme-solar .bottom-text {
      background: linear-gradient(180deg, #b8941a 0%, #8b6b10 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px rgba(184,148,26,0.3));
    }
    body.theme-solar .star { background: #e8a800; box-shadow: 0 0 4px rgba(232,168,0,0.4); }
    body.theme-solar #mandala-bg g { stroke: #8b6b10; stroke-width: 1.2; }




    /* ── Royal Emerald Theme ── */
    body.theme-royal {
      --bg: #061a10;
      --text: #e0f0e6;
      --ctrl-bg: rgba(2,20,12,0.85);
      --ctrl-border: var(--gold3);
      --card-bg: rgba(5,26,16,0.92);
      --card-border: rgba(255,215,0,0.4);
      --mandala-op: 0.22;
      --wheel-disc1: #0a2e1c;
      --wheel-disc2: #05140b;
      --center-disc1: #0e3d25;
      --center-disc2: #041a0e;
      --gold: #ffeb3b;
      --gold2: #ffffff;
      --gold3: #ffd700;
    }



    body.theme-royal #mandala-bg { stroke: #ffd700; }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.5s ease, color 0.5s ease;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 6px 60px;
    }

    /* ── Starfield ── */
    #stars {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .star {
      position: absolute; border-radius: 50%;
      background: #fff;
      animation: twinkle var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
    }
    @keyframes twinkle {
      0%,100% { opacity: var(--min-op); transform: scale(1); }
      50% { opacity: 1; transform: scale(1.6); }
    }

    /* ── Mandala bg ── */
    #mandala-bg {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none; z-index: 0;
      opacity: var(--mandala-op);
      animation: slowSpin 140s linear infinite;
      transition: opacity 0.5s ease;
    }
    @keyframes slowSpin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    /* ── Page ── */
    .page-wrap {
      position: relative; z-index: 1;
      width: 100%;
      display: flex; flex-direction: column; align-items: center;
    }

    /* ── Title ── */
    .main-title {
      font-family: 'Srisakdi', cursive;
      font-size: clamp(28px, 7.5vw, 54px);
      font-weight: 700;
      text-align: center;
      margin-top: 55px; /* Increased to avoid overlap with theme selector on mobile */
      margin-bottom: 6px;
      background: linear-gradient(180deg, #fff9d0 0%, #ffe44d 35%, #e8a800 70%, #c47700 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 18px rgba(255,200,0,0.65));
      animation: titlePulse 3s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%,100% { filter: drop-shadow(0 0 18px rgba(255,200,0,0.65)); }
      50% { filter: drop-shadow(0 0 34px rgba(255,220,60,1)); }
    }
    .title-pop {
      animation: titlePopAnim 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes titlePopAnim {
      0% { opacity:0; transform:scale(0.88) translateY(-8px); }
      60% { opacity:1; transform:scale(1.04) translateY(2px); }
      100% { transform:scale(1) translateY(0); }
    }

    /* ── Controls ── */
    .controls {
      display: flex; align-items: center; gap: 10px;
      margin: 8px 0 14px;
    }
    .controls button {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 1.5px solid var(--ctrl-border);
      background: var(--ctrl-bg);
      color: var(--gold);

      font-size: 28px; font-weight: 900;
      cursor: pointer;
      transition: all 0.18s;
      position: relative; overflow: hidden;
    }
    .controls button::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle, rgba(232,200,74,0.3) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.18s;
    }
    .controls button:hover { border-color: var(--gold); background: rgba(232,200,74,0.14); }
    .controls button:hover::after { opacity: 1; }
    .controls button:active { transform: scale(0.9); }
    .controls input {
      width: 116px; height: 48px;
      border: 1.5px solid var(--ctrl-border);
      border-radius: 10px;
      background: var(--ctrl-bg);
      color: var(--text);
      text-align: center;

      font-size: 22px; font-weight: 700;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .controls input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(232,200,74,0.15), 0 0 20px rgba(232,200,74,0.28);
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    /* ── Wheel ── */
    .canvas-wrap {
      position: relative;
      width: min(96vw, 620px);
      aspect-ratio: 1;
    }
    .canvas-wrap canvas {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 44px rgba(180,140,20,0.38));
    }
    .canvas-wrap canvas.spin {
      animation: wheelReveal 0.55s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes wheelReveal {
      0% { transform: rotate(-14deg) scale(0.96); opacity:0.5; }
      65% { transform: rotate(4deg) scale(1.02); opacity:1; }
      100% { transform: rotate(0) scale(1); }
    }

    /* ── Bottom text ── */
    .bottom-text {
      font-family: 'Srisakdi', cursive;
      font-size: clamp(24px, 7.5vw, 50px);
      font-weight: 700;
      text-align: center;
      margin: 18px 0 10px;
      background: linear-gradient(180deg, #fff9d0 0%, #ffe44d 40%, #e8a800 80%, #c47700 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 12px rgba(255,200,0,0.5));
    }

    /* ── Zodiac info card ── */
    .zodiac-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px 24px 18px;
      max-width: 440px; width: 100%;
      text-align: center;
      margin: 4px 0 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 50px rgba(180,140,20,0.1), inset 0 1px 0 rgba(255,255,255,0.04);
      transition: background 0.5s ease, border 0.5s ease;
    }
    .zodiac-card.card-pop {
      animation: cardPopAnim 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardPopAnim {
      from { opacity:0; transform:translateY(12px) scale(0.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    .zc-label  { font-size: 12px; color: var(--gold3); opacity: 0.7; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:4px; }
    .zc-name   { font-size: 34px; font-weight:900; color:var(--gold); line-height:1.1; }
    .zc-animal { font-size: 16px; color: var(--text); opacity: 0.8; margin-top:3px; }
    .zc-taksa  { margin-top: 10px; font-size: 13px; color: var(--text); opacity: 0.65; }

    .zc-taksa span.bad { color: var(--red); font-weight:700; }
    .zc-taksa span.ok  { color: var(--gold); }

    /* ── Particles ── */
    #particleCanvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 5;
    }

    /* ── Danger overlay ── */
    #dangerFlash {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 4;
      background: radial-gradient(ellipse at center, rgba(210,0,0,0.25) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.12s;
    }
    #dangerFlash.on { opacity: 1; }

    /* ── Shake ── */
    @keyframes shake {
      0%,100% { transform: translate(0,0) rotate(0); }
      10%  { transform: translate(-7px,3px) rotate(-0.4deg); }
      20%  { transform: translate(8px,-3px) rotate(0.35deg); }
      30%  { transform: translate(-5px,6px) rotate(-0.3deg); }
      40%  { transform: translate(7px,-4px) rotate(0.4deg); }
      50%  { transform: translate(-5px,3px) rotate(-0.2deg); }
      60%  { transform: translate(5px,-6px) rotate(0.3deg); }
      70%  { transform: translate(-4px,3px) rotate(-0.25deg); }
      80%  { transform: translate(4px,4px) rotate(0.2deg); }
      90%  { transform: translate(-3px,-2px) rotate(-0.1deg); }
    }
    body.shaking { animation: shake 0.65s ease-out; }

    /* ── Credit ── */
    .credit {
      font-family: var(--font-title);
      font-size: 16px;
      color: var(--text);
      opacity: 0.35;
      margin-top: 8px;
      text-align: center;
      letter-spacing: 0.05em;
    }

    /* ── Theme Selector ── */
    .theme-selector {
      position: fixed; top: 12px; right: 12px;
      display: flex; gap: 8px; z-index: 100;
      background: rgba(0,0,0,0.2);
      padding: 6px; border-radius: 30px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .theme-btn {
      width: 32px; height: 32px;
      border-radius: 50%; border: 2px solid #fff;
      cursor: pointer; transition: transform 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .theme-btn:hover { transform: scale(1.15); }
    .theme-btn.active { border-color: #00ff00; outline: 2px solid rgba(0,255,0,0.3); }
    .btn-sacred { background: linear-gradient(135deg, #03010a, #1e1044); }
    .btn-solar  { background: linear-gradient(135deg, #fff9f0, #ffe44d); }
    .btn-royal  { background: linear-gradient(135deg, #061a10, #ffd700); }

    .back-link {
      position: fixed; top: 18px; left: 12px; z-index: 100;
      background: rgba(255,255,255,0.15); color: #fff;
      text-decoration: none; padding: 8px 14px;
      border-radius: 20px; font-size: 13px; font-weight: 700;
      backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.2s;
    }
    .back-link:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }


    /* ── Customizer Panel ── */
    .customizer {
      position: fixed; bottom: 20px; left: 12px; z-index: 101;
      background: rgba(0,0,0,0.85); color: #fff;
      padding: 15px; border-radius: 12px;
      width: 240px; backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      transform: translateY(calc(100% - 40px));
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .customizer.open { transform: translateY(0); }
    .customizer-toggle {
      position: absolute; top: -45px; left: 0;
      background: #e8c84a; color: #000;
      border: none; padding: 8px 16px;
      border-radius: 8px 8px 0 0; font-weight: 900;
      cursor: pointer; box-shadow: 0 -4px 10px rgba(0,0,0,0.3);
    }
    .custom-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
    .custom-row input[type=color] {
      width: 34px; height: 34px; border: none; background: none; cursor: pointer;
    }
    .reset-btn {
      width: 100%; margin-top: 10px; padding: 6px;
      background: #c0392b; color: #fff; border: none; border-radius: 4px;
      font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>

<a href="index.html" class="back-link">🏠 กลับหน้าหลัก</a>

<div class="customizer" id="customizer">

  <button class="customizer-toggle" onclick="document.getElementById('customizer').classList.toggle('open')">🎨 ออกแบบเอง</button>
  <div class="custom-row"><span>สีพื้นหลังแอป</span> <input type="color" id="cp-bg" value="#03010a"></div>
  <div class="custom-row"><span>สีข้อความ</span> <input type="color" id="cp-text" value="#f0e6c8"></div>
  <div class="custom-row"><span>พื้นในวงล้อ</span> <input type="color" id="cp-wheel" value="#0e0826"></div>
  <div class="custom-row"><span>สีเส้นแบ่ง</span> <input type="color" id="cp-lines" value="#c8a028"></div>
  <div class="custom-row"><span>สีทองหลัก</span> <input type="color" id="cp-gold" value="#e8c84a"></div>
  <button class="reset-btn" onclick="resetCustom()">ล้างค่าใหม่</button>
</div>


<div class="theme-selector">

  <div class="theme-btn btn-solar" onclick="setTheme('solar')" title="Solar Light"></div>
  <div class="theme-btn btn-royal" onclick="setTheme('royal')" title="Royal Emerald"></div>

</div>

<div class="page-wrap">
  <h1 id="mainTitle" class="main-title">13 เมษา 2569 ปีมะเมีย</h1>
  <div class="controls">
    <button id="prevYear" type="button">−</button>

<script>
const Z = [
  { thai:"ชวด",   animal:"หนู",     en:"Rat",     emoji:"🐀", img:"assets/zodiac_rat.png" },
  { thai:"ฉลู",   animal:"วัว",     en:"Ox",      emoji:"🐂", img:"assets/zodiac_ox.png" },
  { thai:"ขาล",   animal:"เสือ",    en:"Tiger",   emoji:"🐯", img:"assets/zodiac_tiger.png" },
  { thai:"เถาะ",  animal:"กระต่าย", en:"Rabbit",  emoji:"🐇", img:"assets/zodiac_rabbit.png" },
  { thai:"มะโรง", animal:"มังกร",   en:"Dragon",  emoji:"🐉", img:"assets/zodiac_dragon.png" },
  { thai:"มะเส็ง",animal:"งู",      en:"Snake",   emoji:"🐍", img:"assets/zodiac_snake.png" },
  { thai:"มะเมีย",animal:"ม้า",     en:"Horse",   emoji:"🐴", img:"assets/zodiac_horse.png" },
  { thai:"มะแม",  animal:"แพะ",     en:"Goat",    emoji:"🐐", img:"assets/zodiac_goat.png" },
  { thai:"วอก",   animal:"ลิง",     en:"Monkey",  emoji:"🐒", img:"assets/zodiac_monkey.png" },
  { thai:"ระกา",  animal:"ไก่",     en:"Rooster", emoji:"🐓", img:"assets/zodiac_rooster.png" },
  { thai:"จอ",    animal:"สุนัข",   en:"Dog",     emoji:"🐕", img:"assets/zodiac_dog.png" },
  { thai:"กุน",   animal:"หมู",     en:"Pig",     emoji:"🐖", img:"assets/zodiac_pig.png" }
];
const TK = [
  { name:"ตนุ",      bad:false },
  { name:"กดุมภะ",   bad:false },
  { name:"สหัชชะ",   bad:false },
  { name:"พันธุ",    bad:false },
  { name:"ปุตตะ",    bad:false },
  { name:"อริ",      bad:true  },
  { name:"ปัตนิ",    bad:false },
  { name:"มรณะ",     bad:true  },
  { name:"ศุภะ",     bad:false },
  { name:"กัมมะ",    bad:false },
  { name:"ลาภะ",     bad:false },
  { name:"วินาสน์",  bad:true  }
];
const BY = 2569, BI = 6;
const FONT = "'Noto Serif Thai', serif";
let currentTheme = 'sacred';

function getCssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}



/* preload */
const imgs = {};
let loaded = 0;
Z.forEach(z => {
  const im = new Image();
  im.src = z.img;
  im.onload = im.onerror = () => { if(++loaded===12) render(false); };
  imgs[z.en] = im;
});

function mod(v,n){ return ((v%n)+n)%n; }
function y2i(y){ return mod(Number(y)-BY+BI,12); }
function toR(d){ return d*Math.PI/180; }
function ang(i){ return -90 - i*30; }

const cv  = document.getElementById('wheelCanvas');
const ctx = cv.getContext('2d');
const W = cv.width, CX = W/2, CY = W/2;
const RO=470, RI=454, RS=448, RN=264, RC=88, RL=568, RZ=350;

function drawWheel(ai){
  ctx.clearRect(0,0,W,W);

  // Custom Colors from Pickers
  const custom = {
    bg: document.getElementById('cp-bg').value,
    text: document.getElementById('cp-text').value,
    wheel: document.getElementById('cp-wheel').value,
    lines: document.getElementById('cp-lines').value,
    gold: document.getElementById('cp-gold').value
  };

  // Theme-based colors for Canvas
  const colors = {
    custom: {
      outer: [custom.gold, custom.gold, custom.gold],
      inner: [custom.wheel, custom.wheel],
      lines: hexToRgba(custom.lines, 0.6),
      text: custom.gold,
      center: [custom.wheel, custom.wheel],
      gold: custom.gold,
      redShadow: false
    },
    solar: {

      outer: ['#d4a017', '#ffe87a', '#7a5200'],
      inner: ['#ffffff', '#f5f5f5'],
      lines: 'rgba(0,0,0,0.25)',
      text: '#000000',
      center: ['#ffffff', '#eeeeee'],
      gold: '#b8941a',
      redShadow: false
    },
    sacred: {
      outer: ['#5c3f00', '#d4a017', '#ffe87a', '#7a5200'],
      inner: ['#0e0826', '#04020e'],
      lines: 'rgba(200,160,40,0.6)',
      text: '#ffe87a',
      center: ['#1e1044', '#050210'],
      gold: '#e8c84a',
      redShadow: true
    },
    royal: {
      outer: ['#7a5200', '#ffd700', '#7a5200'],
      inner: ['#0a2e1c', '#05140b'],
      lines: 'rgba(212,175,55,0.6)',
      text: '#ffd700',
      center: ['#0e3d25', '#041a0e'],
      gold: '#ffd700',
      redShadow: true
    }
  };

  
  // Use custom if theme is set to 'custom'
  const theme = currentTheme === 'custom' ? colors.custom : (colors[currentTheme] || colors.sacred);

  /* Gold outer ring */

  const rg = ctx.createRadialGradient(CX,CY,RI-2,CX,CY,RO+2);
  if(currentTheme==='solar'){
    rg.addColorStop(0, '#b8941a'); 
    rg.addColorStop(0.5, '#ffe87a'); 
    rg.addColorStop(1, '#b8941a');
  } else {
    rg.addColorStop(0, theme.outer[0]);
    rg.addColorStop(0.5, theme.outer[1]);
    rg.addColorStop(1, theme.outer[theme.outer.length-1]);
  }
  ctx.beginPath(); ctx.arc(CX,CY,RO,0,Math.PI*2);
  ctx.fillStyle=rg; ctx.fill();



  /* Tick marks */
  for(let i=0;i<72;i++){
    const a=toR(i*5), r=i%6===0?RO-8:RO-11;
    ctx.beginPath();
    ctx.arc(CX+r*Math.cos(a),CY+r*Math.sin(a),i%6===0?3:1.4,0,Math.PI*2);
    ctx.fillStyle=i%6===0?'#fff3a0':'rgba(232,200,74,0.5)'; ctx.fill();
  }

  /* Dark disc */
  ctx.beginPath(); ctx.arc(CX,CY,RI,0,Math.PI*2);
  const dg=ctx.createRadialGradient(CX,CY,0,CX,CY,RI);
  dg.addColorStop(0, theme.inner[0]); 
  dg.addColorStop(1, theme.inner[1]);
  ctx.fillStyle=dg; ctx.fill();




  /* Segment dividers */
  for(let i=0;i<12;i++){
    const a=toR(ang(i)+15);
    ctx.beginPath();
    ctx.moveTo(CX+RC*Math.cos(a),CY+RC*Math.sin(a));
    ctx.lineTo(CX+RS*Math.cos(a),CY+RS*Math.sin(a));
    ctx.strokeStyle=theme.lines;
    ctx.lineWidth=2; ctx.stroke();
  }

  ctx.shadowBlur=0;


  /* Sub-ring */
  ctx.beginPath(); ctx.arc(CX,CY,RN+16,0,Math.PI*2);
  ctx.strokeStyle=currentTheme==='solar'?'rgba(0,0,0,0.1)':'rgba(232,200,74,0.18)'; 
  ctx.lineWidth=1; ctx.stroke();

  /* Red ring */
  ctx.beginPath(); ctx.arc(CX,CY,RN,0,Math.PI*2);
  if(currentTheme!=='solar') {
    ctx.shadowColor='rgba(255,40,30,0.9)'; ctx.shadowBlur=22;
  }
  ctx.strokeStyle='#ff3020'; ctx.lineWidth=5; ctx.stroke();
  ctx.shadowBlur=0;

  ctx.beginPath(); ctx.arc(CX,CY,RN-8,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,60,40,0.2)'; ctx.lineWidth=1; ctx.stroke();

  /* Animals + names */
  for(let i=0;i<12;i++){
    const a=toR(ang(i)), z=Z[i], im=imgs[z.en];
    if(im && im.complete && im.naturalWidth){
      const iw=160;
      ctx.save();
      ctx.filter='saturate(1.35) contrast(1.08) brightness(1.12)';
      ctx.shadowColor='rgba(0,0,0,0.7)'; ctx.shadowBlur=18;
      ctx.shadowOffsetX=3; ctx.shadowOffsetY=3;
      ctx.drawImage(im, CX+RZ*Math.cos(a)-iw/2, CY+RZ*Math.sin(a)-iw/2, iw, iw);
      ctx.restore();
    }
    ctx.save();
    ctx.translate(CX,CY);
    let rot=(a+Math.PI/2+Math.PI*2)%(Math.PI*2);
    ctx.font=`700 32px ${FONT}`;
    ctx.fillStyle=theme.text;
    ctx.textAlign='center';


    if(rot>Math.PI/2 && rot<Math.PI*1.5){

      ctx.rotate(rot+Math.PI); ctx.textBaseline='bottom';
      ctx.fillText(z.thai,0,RN-10);
    } else {
      ctx.rotate(rot); ctx.textBaseline='top';
      ctx.fillText(z.thai,0,-RN+10);
    }
    ctx.restore();
  }

  /* Center circle */
  const cg=ctx.createRadialGradient(CX,CY,0,CX,CY,RC);
  cg.addColorStop(0, theme.center[0]); 
  cg.addColorStop(1, theme.center[1]);
  ctx.beginPath(); ctx.arc(CX,CY,RC,0,Math.PI*2);
  ctx.fillStyle=cg; ctx.fill();
  ctx.strokeStyle=theme.gold; ctx.lineWidth=4; ctx.stroke();
  ctx.shadowBlur=0;
  for(let i=0;i<12;i++){
    const a=toR(i*30);
    ctx.beginPath();
    ctx.arc(CX+(RC-16)*Math.cos(a),CY+(RC-16)*Math.sin(a),3.5,0,Math.PI*2);
    ctx.fillStyle='#d4a017'; ctx.fill();
  }
  ctx.font=`900 48px ${FONT}`;
  ctx.fillStyle=getCssVar('--gold');
  ctx.shadowColor=getCssVar('--gold'); ctx.shadowBlur=20;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('✦',CX,CY);
  ctx.shadowBlur=0;


  /* ทักษา labels */
  let danger=false;
  for(let i=0;i<12;i++){
    const ti=mod(i-ai,12), tk=TK[ti];
    const a=toR(ang(i));
    const lx=CX+RL*Math.cos(a), ly=CY+RL*Math.sin(a);
    if(ti===0){
    ctx.font=`900 56px ${FONT}`;
    ctx.fillStyle=theme.text;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('ตนุ',lx,ly);
    ctx.shadowBlur=0;
    const rl2=RL+70, al2=a+0.075;
    ctx.font=`900 108px ${FONT}`;
    ctx.fillStyle=currentTheme==='solar'?'#c0392b':'#ff4030';
    ctx.fillText('ล',CX+rl2*Math.cos(al2),CY+rl2*Math.sin(al2));
    ctx.shadowBlur=0;
    } else if(tk.bad){
      danger=true;
      ctx.font=`900 58px ${FONT}`;
      ctx.fillStyle=currentTheme==='solar'?'#c0392b':'#ff3020';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(tk.name,lx,ly);
    } else {
      ctx.font=`700 50px ${FONT}`;
      ctx.fillStyle=theme.text;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(tk.name,lx,ly);
    }


  }
  return danger;
}

/* Particles */
const pc=document.getElementById('particleCanvas');
const pctx=pc.getContext('2d');
let particles=[];
function resizePC(){ pc.width=innerWidth; pc.height=innerHeight; }
resizePC(); addEventListener('resize',resizePC);

function burst(cx,cy,n=35,red=false){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=Math.random()*5+1.5;
    const isRed=red&&Math.random()<0.5;
    particles.push({
      x:cx,y:cy, vx:Math.cos(a)*s, vy:Math.sin(a)*s-1.5,
      r:Math.random()*3+1, life:1, decay:Math.random()*0.018+0.01,
      col:isRed?getCssVar('--red'):getCssVar('--gold'),
      glow:isRed?getCssVar('--red'):getCssVar('--gold')
    });
  }
}

(function animP(){
  pctx.clearRect(0,0,pc.width,pc.height);
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.07; p.life-=p.decay;
    pctx.save();
    pctx.globalAlpha=Math.max(0,p.life);
    pctx.shadowColor=p.glow+p.life+')'; pctx.shadowBlur=12;
    pctx.beginPath(); pctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    pctx.fillStyle=p.col; pctx.fill();
    pctx.restore();
  }
  requestAnimationFrame(animP);
})();

/* Starfield */
const sf=document.getElementById('stars');
for(let i=0;i<200;i++){
  const s=document.createElement('div'), sz=Math.random()*2.4+0.3;
  s.className='star';
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;`+
    `--dur:${(Math.random()*3+2).toFixed(2)}s;--delay:${(Math.random()*5).toFixed(2)}s;`+
    `--min-op:${(Math.random()*0.12+0.03).toFixed(2)};`;
  sf.appendChild(s);
}

/* Effects */
const dangerFlash=document.getElementById('dangerFlash');
function triggerShake(){
  document.body.classList.remove('shaking');
  void document.body.offsetWidth;
  document.body.classList.add('shaking');
  document.body.addEventListener('animationend',()=>document.body.classList.remove('shaking'),{once:true});
}
function triggerSpin(){
  cv.classList.remove('spin'); void cv.offsetWidth; cv.classList.add('spin');
  cv.addEventListener('animationend',()=>cv.classList.remove('spin'),{once:true});
}
function triggerDanger(){
  triggerShake();
  dangerFlash.classList.add('on');
  setTimeout(()=>dangerFlash.classList.remove('on'),320);
  const r=cv.getBoundingClientRect();
  burst(r.left+r.width/2, r.top+r.height/2, 55, true);
}

/* Card update */
function updateCard(ai,hasDanger){
  const z=Z[ai];
  document.getElementById('zcName').textContent=`ปี${z.thai}`;
  document.getElementById('zcAnimal').textContent=`${z.animal} ${z.emoji}`;
  const badOnes=[];
  for(let i=0;i<12;i++){
    const ti=mod(i-ai,12);
    if(TK[ti].bad) badOnes.push(`<span class="bad">${TK[ti].name}</span>`);
  }
  document.getElementById('zcTaksa').innerHTML = hasDanger
    ? `⚠️ ระวัง: ${badOnes.join(' · ')}`
    : `<span class="ok">✦ ปีนี้ไม่มีทักษาร้าย</span>`;
  const card=document.getElementById('zodiacCard');
  card.classList.remove('card-pop'); void card.offsetWidth; card.classList.add('card-pop');
}

/* Render */
function render(animate){
  const y=Number(document.getElementById('yearInput').value)||BY;
  const ai=y2i(y);
  const titleEl=document.getElementById('mainTitle');
  titleEl.textContent=`13 เมษา ${y} ปี${Z[ai].thai}`;
  titleEl.classList.remove('title-pop'); void titleEl.offsetWidth; titleEl.classList.add('title-pop');
  if(animate) triggerSpin();
  const hasDanger=drawWheel(ai);
  updateCard(ai,hasDanger);
  if(animate && hasDanger) triggerDanger();
  if(animate){
    const r=document.getElementById('nextYear').getBoundingClientRect();
    burst(r.left+r.width/2, r.top+r.height/2, 18, false);
  }
}

document.getElementById('prevYear').onclick=()=>{
  const inp=document.getElementById('yearInput');
  inp.value=(Number(inp.value)||BY)-1; render(true);
};
document.getElementById('nextYear').onclick=()=>{
  const inp=document.getElementById('yearInput');
  inp.value=(Number(inp.value)||BY)+1; render(true);
};
document.getElementById('yearInput').addEventListener('input',()=>render(false));

function setTheme(t) {
  currentTheme = t;
  document.body.className = t === 'sacred' ? '' : 'theme-' + t;
  
  if (t === 'custom') {
    applyCustomStyles();
  } else {
    // Clear custom inline styles when switching to standard themes
    document.body.style.removeProperty('--bg');
    document.body.style.removeProperty('--text');
    document.body.style.removeProperty('--gold');
  }

  // Update UI buttons
  document.querySelectorAll('.theme-btn').forEach(btn => {
    const isCustomBtn = btn.style.background.includes('linear-gradient');
    btn.classList.toggle('active', isCustomBtn ? t === 'custom' : btn.classList.contains('btn-' + t));
  });

  // Re-render
  setTimeout(() => render(false), 50);
  localStorage.setItem('songkran_theme', t);
}


function applyCustomStyles() {
  if (currentTheme !== 'custom') return;
  const bg = document.getElementById('cp-bg').value;
  const text = document.getElementById('cp-text').value;
  document.body.style.setProperty('--bg', bg);
  document.body.style.setProperty('--text', text);
  document.body.style.setProperty('--gold', document.getElementById('cp-gold').value);
  render(false);
  saveCustomData();
}

function saveCustomData() {
  const data = {
    bg: document.getElementById('cp-bg').value,
    text: document.getElementById('cp-text').value,
    wheel: document.getElementById('cp-wheel').value,
    lines: document.getElementById('cp-lines').value,
    gold: document.getElementById('cp-gold').value
  };
  localStorage.setItem('songkran_custom_colors', JSON.stringify(data));
}

function loadCustomData() {
  const data = JSON.parse(localStorage.getItem('songkran_custom_colors'));
  if (data) {
    document.getElementById('cp-bg').value = data.bg;
    document.getElementById('cp-text').value = data.text;
    document.getElementById('cp-wheel').value = data.wheel;
    document.getElementById('cp-lines').value = data.lines;
    document.getElementById('cp-gold').value = data.gold;
  }
}

function resetCustom() {
  localStorage.removeItem('songkran_custom_colors');
  location.reload();
}

// Add event listeners for live preview
['cp-bg', 'cp-text', 'cp-wheel', 'cp-lines', 'cp-gold'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    if (currentTheme === 'custom') applyCustomStyles();
    else setTheme('custom');
  });
});

loadCustomData();
// Load saved theme
const savedTheme = localStorage.getItem('songkran_theme');
if (savedTheme) setTheme(savedTheme);

render(false);
</script>
