<!doctype html>
<html lang="th">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>อายุจรประจำปี</title>
  <meta name="description" content="คำนวณอายุจรประจำปีตามโหราศาสตร์ไทย ดูวันดีวันไม่ดีรายวัน รายเดือน และครบรอบปี">
  <meta property="og:title" content="อายุจรประจำปี">
  <meta property="og:description"
    content="คำนวณอายุจรประจำปีตามโหราศาสตร์ไทย ดูวันดีวันไม่ดีรายวัน รายเดือน และครบรอบปี">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=K2D:wght@400;600;700;800&family=Srisakdi:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --muted: #656565;
      --title: #1a1a1a;
      --ctrl-bg: #f5f5f5;
      --ctrl-text: #111111;
      --ctrl-border: #333333;
      --card-bg: #fffbf0;
      --card-border: #c8951a;
      --surface: #ffffff;
      --soft: #f6f3ea;
      --good: #147d49;
      --good-bg: #e9f7ef;
      --good-glow: rgba(20, 125, 73, 0.22);
      --caution: #b3261e;
      --caution-bg: #fff0ee;
      --caution-glow: rgba(179, 38, 30, 0.2);
      --focus: #2f80ed;
      --shadow: rgba(0, 0, 0, 0.16);
      --title-shadow: transparent;
    }

    body.theme-sacred {
      --bg: #03010a;
      --text: #f0e6c8;
      --muted: #bba979;
      --title: #e8c84a;
      --ctrl-bg: #1e1044;
      --ctrl-text: #e8c84a;
      --ctrl-border: #e8c84a;
      --card-bg: #0e0826;
      --card-border: #e8c84a;
      --surface: #100923;
      --soft: #1b1038;
      --good: #72d89a;
      --good-bg: #102d1d;
      --good-glow: rgba(114, 216, 154, 0.28);
      --caution: #ff9a92;
      --caution-bg: #32100f;
      --caution-glow: rgba(255, 154, 146, 0.26);
      --focus: #7eb6ff;
      --shadow: rgba(0, 0, 0, 0.45);
      --title-shadow: rgba(232, 200, 74, 0.45);
    }

    body.theme-royal {
      --bg: #061a10;
      --text: #ffd700;
      --muted: #e3c35a;
      --title: #ffd700;
      --ctrl-bg: #0e3d25;
      --ctrl-text: #ffd700;
      --ctrl-border: #ffd700;
      --card-bg: #0a2e1c;
      --card-border: #ffd700;
      --surface: #092617;
      --soft: #103b25;
      --good: #a8f0b6;
      --good-bg: #13391f;
      --good-glow: rgba(168, 240, 182, 0.25);
      --caution: #ffb4ab;
      --caution-bg: #3f1712;
      --caution-glow: rgba(255, 180, 171, 0.24);
      --focus: #8fc7ff;
      --shadow: rgba(0, 0, 0, 0.45);
      --title-shadow: rgba(255, 215, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'K2D', sans-serif;
      transition: background 0.25s, color 0.25s;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .theme-selector {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .theme-main-btn {
      width: 48px;
      height: 48px;
      border: 2px solid var(--ctrl-border);
      border-radius: 50%;
      background: var(--ctrl-bg);
      color: var(--ctrl-text);
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 4px 15px var(--shadow);
    }

    .theme-options {
      display: none;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 30px;
      background: rgba(0, 0, 0, 0.76);
      box-shadow: 0 8px 28px var(--shadow);
      backdrop-filter: blur(12px);
    }

    .theme-selector.open .theme-options {
      display: flex;
    }

    .theme-btn {
      width: 40px;
      height: 40px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      background: #ffffff;
    }

    .theme-btn.active {
      outline: 3px solid rgba(47, 128, 237, 0.42);
      border-color: var(--focus);
    }

    .btn-sacred {
      background: linear-gradient(135deg, #03010a, #1e1044);
    }

    .btn-solar {
      background: #ffffff;
    }

    .btn-royal {
      background: linear-gradient(135deg, #061a10, #ffd700);
    }

    .btn-custom {
      background: linear-gradient(135deg, #f00, #0f0, #00f);
      color: #ffffff;
      font-size: 18px;
      text-decoration: none;
    }

    .app-shell {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 0 clamp(8px, 3vw, 16px) 36px;
    }

    .tool-nav {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 6px;
      margin: 68px 0 8px;
      padding: 5px;
      border: 2px solid var(--ctrl-border);
      border-radius: 8px;
      background: var(--ctrl-bg);
    }

    .tool-nav a {
      min-width: 0;
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px 6px;
      border-radius: 6px;
      color: var(--ctrl-text);
      font-size: clamp(14px, 3.8vw, 17px);
      font-weight: 800;
      text-align: center;
      text-decoration: none;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .tool-nav a.active {
      background: var(--card-border);
      color: var(--bg);
    }

    .page-head {
      position: relative;
      padding: 8px 44px 8px;
      text-align: center;
    }

    .page-head h1 {
      margin: 0;
      color: var(--title);
      font-family: 'Srisakdi', cursive;
      font-size: clamp(28px, 7.5vw, 54px);
      line-height: 1.35;
      padding: 0.04em 0 0.16em;
      text-shadow: 0 0 10px var(--title-shadow);
    }

    .range-summary {
      min-height: 28px;
      margin-top: 2px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.5;
      padding-bottom: 2px;
    }

    .control-panel {
      padding: 10px;
      border: 2px solid var(--card-border);
      border-radius: 8px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--card-bg) 92%, var(--good-bg) 8%), var(--card-bg) 48%, color-mix(in srgb, var(--card-bg) 92%, var(--caution-bg) 8%));
      box-shadow: 0 8px 26px var(--shadow);
    }

    .segmented {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 6px;
      margin-bottom: 10px;
      padding: 4px;
      border: 1px solid var(--ctrl-border);
      border-radius: 8px;
      background: var(--surface);
    }

    .segmented button,
    .filter-row button,
    .action-row button {
      min-width: 0;
      min-height: 42px;
      padding: 0 6px;
      border: 1px solid var(--ctrl-border);
      border-radius: 6px;
      background: var(--ctrl-bg);
      color: var(--ctrl-text);
      font-weight: 800;
      line-height: 1.15;
    }

    .segmented button.active,
    .filter-row button.active {
      background: var(--card-border);
      color: var(--bg);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(150px, 100%), 1fr));
      gap: 10px;
    }

    .field {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field[hidden] {
      display: none !important;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .field input,
    .field select {
      width: 100%;
      min-width: 0;
      min-height: 44px;
      border: 2px solid var(--ctrl-border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      padding: 0 10px;
      font-size: 17px;
      font-weight: 800;
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.2);
    }

    body[data-age-mode="month"] .annual-only,
    body[data-age-mode="year"] .month-only {
      display: none;
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(150px, 100%), 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .filter-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(110px, 100%), 1fr));
      gap: 6px;
      margin: 12px 0 8px;
    }

    .filter-row button[data-filter="good"].active {
      background: var(--good);
      color: #ffffff;
      box-shadow: 0 0 0 3px var(--good-glow);
    }

    .filter-row button[data-filter="caution"].active {
      background: var(--caution);
      color: #ffffff;
      box-shadow: 0 0 0 3px var(--caution-glow);
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin: 10px 0 8px;
    }

    .summary-pill {
      min-width: 0;
      padding: 8px 6px;
      border: 1px solid var(--ctrl-border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      text-align: center;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.07);
    }

    .summary-pill strong {
      display: block;
      font-size: clamp(19px, 5.5vw, 26px);
      line-height: 1;
    }

    .summary-pill span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .summary-pill.good {
      border-color: var(--good);
      background: var(--good-bg);
      box-shadow: 0 0 18px var(--good-glow);
    }

    .summary-pill.caution {
      border-color: var(--caution);
      background: var(--caution-bg);
      box-shadow: 0 0 18px var(--caution-glow);
    }

    .month-filter {
      margin: 8px 0;
    }

    .month-filter label {
      display: block;
      margin: 0 0 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .month-filter select {
      width: 100%;
      min-height: 44px;
      border: 2px solid var(--ctrl-border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      padding: 0 10px;
      font-size: 16px;
      font-weight: 800;
    }

    .notice {
      min-height: 24px;
      margin: 8px 2px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      text-align: center;
    }

    .results {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .day-card {
      position: relative;
      width: 100%;
      min-height: 78px;
      display: grid;
      grid-template-columns: minmax(76px, 0.5fr) minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 2px solid var(--ctrl-border);
      border-left-width: 7px;
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      text-align: left;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.08);
      transform: translateY(0);
      animation: cardIn 0.32s ease both;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .day-card::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }

    .day-card:active {
      transform: scale(0.985);
    }

    .day-card:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .day-card.good {
      border-left-color: var(--good);
      border-color: color-mix(in srgb, var(--good) 55%, var(--ctrl-border));
      background:
        linear-gradient(90deg, var(--good-bg), var(--surface) 52%),
        var(--good-bg);
      box-shadow: 0 8px 22px var(--good-glow);
    }

    .day-card.good::before {
      background: linear-gradient(110deg, transparent 0%, rgba(255, 255, 255, 0.2) 42%, rgba(255, 255, 255, 0.75) 50%, rgba(255, 255, 255, 0.2) 58%, transparent 100%);
      transform: translateX(-120%);
      animation: goodSweep 3.8s ease-in-out infinite;
      opacity: 1;
    }

    .day-card.caution {
      border-left-color: var(--caution);
      border-color: color-mix(in srgb, var(--caution) 62%, var(--ctrl-border));
      background:
        linear-gradient(90deg, var(--caution-bg), var(--surface) 55%),
        var(--caution-bg);
      box-shadow: 0 8px 22px var(--caution-glow);
      animation: cardIn 0.32s ease both, cautionPulse 2.6s ease-in-out infinite;
    }

    .day-card.caution::before {
      background: repeating-linear-gradient(135deg, transparent 0 10px, color-mix(in srgb, var(--caution) 20%, transparent) 10px 12px);
      opacity: 0.2;
    }

    .date-line {
      min-width: 0;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.1;
    }

    .date-year {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .house-line {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .house-name {
      font-size: 19px;
      font-weight: 800;
    }

    .house-short {
      overflow: hidden;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .level {
      min-width: 48px;
      padding: 5px 8px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.12);
    }

    .good .level {
      background: var(--good);
      color: #ffffff;
      box-shadow: 0 0 14px var(--good-glow);
    }

    .caution .level {
      background: var(--caution);
      color: #ffffff;
      box-shadow: 0 0 14px var(--caution-glow);
    }

    .empty-state {
      padding: 24px 12px;
      border: 2px dashed var(--ctrl-border);
      border-radius: 8px;
      color: var(--muted);
      font-weight: 800;
      text-align: center;
    }

    .sheet-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: flex-end;
      background: rgba(0, 0, 0, 0.48);
      padding: 12px;
    }

    .sheet-overlay.open {
      display: flex;
    }

    .sheet {
      width: min(100%, 720px);
      max-height: 86vh;
      margin: 0 auto;
      overflow: auto;
      border: 2px solid var(--card-border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 18px 40px var(--shadow);
      animation: sheetUp 0.22s ease both;
    }

    .sheet-head {
      position: sticky;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--ctrl-border);
      background: var(--surface);
    }

    .sheet-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .sheet-close {
      width: 40px;
      height: 40px;
      border: 2px solid var(--ctrl-border);
      border-radius: 50%;
      background: var(--ctrl-bg);
      color: var(--ctrl-text);
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .sheet-body {
      padding: 14px;
    }

    .sheet-date {
      margin: 0 0 8px;
      color: var(--muted);
      font-weight: 800;
    }

    .sheet-meaning {
      margin: 0;
      line-height: 1.65;
    }

    .sheet-lead {
      display: block;
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 800;
    }

    .sheet-oracle {
      display: block;
      margin: 0 0 10px;
      padding: 9px 10px;
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 10%, var(--surface));
      font-size: 16px;
      font-weight: 800;
      line-height: 1.55;
    }

    .sheet-plain {
      display: block;
      margin: 0 0 12px;
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
    }

    .sheet-advice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 12px 0;
    }

    .sheet-advice {
      padding: 10px;
      border: 1px solid var(--ctrl-border);
      border-radius: 8px;
      background: var(--ctrl-bg);
    }

    .sheet-advice.do {
      border-color: color-mix(in srgb, var(--good) 55%, var(--ctrl-border));
      background: var(--good-bg);
    }

    .sheet-advice.watch {
      border-color: color-mix(in srgb, var(--caution) 55%, var(--ctrl-border));
      background: var(--caution-bg);
    }

    .sheet-advice-title {
      display: block;
      margin: 0 0 6px;
      font-size: 14px;
      font-weight: 900;
    }

    .sheet-advice ul {
      margin: 0;
      padding-left: 18px;
    }

    .sheet-advice li {
      margin: 4px 0;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.45;
    }

    .sheet-example {
      display: block;
      margin: 12px 0 0;
      padding: 10px;
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 12%, var(--surface));
      font-size: 15px;
      font-weight: 700;
    }

    .credit {
      margin: 20px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }

    .audio-group {
      position: fixed;
      bottom: 30px;
      left: 0;
      z-index: 40;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px 12px 12px 12px;
      border: 1.5px solid #ffd700;
      border-left: none;
      border-radius: 0 45px 45px 0;
      background: rgba(0, 0, 0, 0.5);
      box-shadow: 5px 0 25px rgba(255, 215, 0, 0.2);
      backdrop-filter: blur(12px);
      /* ซ่อนทิ้งไว้เหลือแค่ขอบเล็กน้อย — เลื่อนออกซ้ายให้เหลือ ~8px โผล่ */
      transform: translateX(calc(-100% + 8px));
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .audio-group.active {
      transform: translateX(0);
      background: rgba(0, 0, 0, 0.85);
    }

    .music-btn,
    .vol-toggle-btn,
    .share-btn {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #ffffff;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffd700, #b8860b);
      color: #000000;
      font-size: 23px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.5);
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .music-btn:hover,
    .vol-toggle-btn:hover,
    .share-btn:hover {
      filter: brightness(1.08);
    }

    .music-btn:active,
    .vol-toggle-btn:active,
    .share-btn:active {
      transform: scale(0.9);
    }

    .vol-toggle-btn {
      font-size: 20px;
    }

    .vol-container {
      position: fixed;
      bottom: 35px;
      left: 100px;
      z-index: 41;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      border: 1.5px solid #ffd700;
      border-radius: 40px;
      background: rgba(0, 0, 0, 0.9);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 15px rgba(255, 215, 0, 0.2);
      backdrop-filter: blur(15px);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .vol-container input[type=range] {
      width: 110px;
      height: 6px;
      border-radius: 3px;
      appearance: none;
      background: rgba(255, 215, 0, 0.2);
      outline: none;
      cursor: pointer;
    }

    .vol-container input[type=range]::-webkit-slider-thumb {
      width: 18px;
      height: 18px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      appearance: none;
      background: #ffd700;
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.9);
    }

    .share-group {
      position: fixed;
      right: 0;
      bottom: 30px;
      z-index: 39;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px 12px 12px 12px;
      border: 1.5px solid #ffd700;
      border-right: none;
      border-radius: 45px 0 0 45px;
      background: rgba(0, 0, 0, 0.5);
      box-shadow: -5px 0 25px rgba(255, 215, 0, 0.2);
      backdrop-filter: blur(12px);
      /* ซ่อนทางขวา เหลือ ~8px โผล่ */
      transform: translateX(calc(100% - 8px));
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .share-group.active {
      transform: translateX(0);
      background: rgba(0, 0, 0, 0.85);
    }

    .share-notice {
      position: fixed;
      left: 50%;
      bottom: 106px;
      z-index: 52;
      max-width: min(92vw, 520px);
      padding: 12px 16px;
      border: 1.5px solid #ffd700;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.88);
      color: #ffd700;
      font-size: 15px;
      font-weight: 800;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 12px);
      transition: opacity 0.25s, transform 0.25s;
    }

    .share-notice.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (min-width: 680px) {
      .results {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 420px) {
      .app-shell {
        padding-left: 8px;
        padding-right: 8px;
      }

      .control-panel {
        padding: 8px;
      }

      .form-grid {
        gap: 8px;
      }

      .day-card {
        grid-template-columns: 76px 1fr;
        min-height: 84px;
      }

      .sheet-advice-grid {
        grid-template-columns: 1fr;
      }

      .level {
        grid-column: 2;
        justify-self: start;
      }
    }

    @media (max-width: 340px) {

      .tool-nav,
      .segmented {
        grid-template-columns: 1fr;
      }

      .day-card {
        grid-template-columns: 1fr;
      }

      .level {
        grid-column: 1;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      .day-card,
      .day-card.good::before,
      .day-card.caution,
      .sheet {
        animation: none;
      }
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes goodSweep {

      0%,
      62% {
        transform: translateX(-120%);
      }

      100% {
        transform: translateX(120%);
      }
    }

    @keyframes cautionPulse {

      0%,
      100% {
        box-shadow: 0 8px 22px var(--caution-glow);
      }

      50% {
        box-shadow: 0 8px 28px color-mix(in srgb, var(--caution-glow) 60%, var(--caution));
      }
    }

    @keyframes sheetUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .sheet-drag-handle {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 0 4px;
    }

    .sheet-drag-handle::before {
      content: '';
      width: 40px;
      height: 5px;
      border-radius: 999px;
      background: var(--ctrl-border);
      opacity: 0.55;
      position: absolute;
    }

    #scrollTopBtn {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1.5px solid var(--card-border);
      background: var(--surface);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 2px 12px var(--shadow);
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease, bottom 0.3s ease;
      -webkit-text-fill-color: initial;
    }

    #scrollTopBtn.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* เมื่อ sheet เปิด ปุ่มขึ้นไปอยู่เหนือ sheet */
    .sheet-overlay.open~#scrollTopBtn,
    body:has(.sheet-overlay.open) #scrollTopBtn {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(80px);
    }

    #scrollTopBtn:hover {
      background: var(--card-border);
      color: #fff;
      -webkit-text-fill-color: initial;
    }

    body.theme-sacred .page-head h1 {
      background: linear-gradient(135deg, #e8c84a 0%, #fff5c0 45%, #c8951a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 18px rgba(232, 200, 74, 0.55));
    }

    body.theme-royal .page-head h1 {
      background: linear-gradient(135deg, #ffd700 0%, #fffde0 45%, #b8860b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 18px rgba(255, 215, 0, 0.55));
    }

    /* ── ENHANCED CARD HOVER ── */
    @media (hover: hover) {
      .day-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 28px var(--shadow);
        border-color: var(--card-border);
      }

      .day-card.good:hover {
        box-shadow: 0 14px 32px var(--good-glow), 0 0 0 1px var(--good);
      }

      .day-card.caution:hover {
        box-shadow: 0 14px 32px var(--caution-glow), 0 0 0 1px var(--caution);
      }
    }

    /* ── PRIMARY ACTION BUTTON ── */
    #todayBtn {
      background: linear-gradient(135deg, #c8951a 0%, #f0c040 50%, #c8951a 100%);
      background-size: 200% 100%;
      color: #1a0a00;
      border-color: #b8860b;
      font-weight: 800;
      transition: background-position 0.4s ease, transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 14px rgba(200, 149, 26, 0.35);
    }

    #todayBtn:hover {
      background-position: 100% 0;
      box-shadow: 0 6px 20px rgba(200, 149, 26, 0.55);
    }

    #todayBtn:active {
      transform: scale(0.96);
    }

    body.theme-sacred #todayBtn,
    body.theme-royal #todayBtn {
      box-shadow: 0 4px 18px rgba(232, 200, 74, 0.45);
    }

    /* ── COPY BUTTON SUCCESS STATE ── */
    #copyBtn.copied {
      background: var(--good);
      color: #ffffff;
      border-color: var(--good);
    }

    /* ── SUMMARY PILLS ENHANCED ── */
    .summary-pill .pill-icon {
      display: block;
      font-size: clamp(18px, 4.5vw, 24px);
      line-height: 1;
      margin-bottom: 2px;
    }

    .summary-pill strong {
      display: block;
      font-size: clamp(19px, 5.5vw, 26px);
      line-height: 1;
    }

    /* ── FILTER COUNT BADGE ── */
    .filter-row button .filter-count {
      display: inline-block;
      margin-left: 4px;
      padding: 0 5px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.15);
      font-size: 11px;
      font-weight: 800;
      vertical-align: middle;
      line-height: 16px;
    }

    .filter-row button.active .filter-count {
      background: rgba(255, 255, 255, 0.25);
    }

    /* ── VOL CONTAINER HIDDEN CLASS ── */
    .vol-hidden {
      opacity: 0 !important;
      pointer-events: none !important;
      transform: translateX(-20px) !important;
    }

    /* ── SKELETON LOADING ── */
    .skeleton-card {
      width: 100%;
      min-height: 78px;
      border-radius: 8px;
      background: var(--surface);
      border: 2px solid var(--ctrl-border);
      border-left-width: 7px;
      overflow: hidden;
      position: relative;
    }

    .skeleton-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.12) 50%, transparent 100%);
      animation: skeletonShimmer 1.4s ease-in-out infinite;
    }

    body.theme-sacred .skeleton-card::after,
    body.theme-royal .skeleton-card::after {
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.07) 50%, transparent 100%);
    }

    @keyframes skeletonShimmer {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(100%);
      }
    }

    /* ── CONTROL PANEL SECTION DIVIDER ── */
    .panel-divider {
      height: 1px;
      background: var(--ctrl-border);
      opacity: 0.35;
      margin: 10px 0;
    }

    /* ── ENHANCED SHEET ── */
    .sheet-head {
      border-radius: 8px 8px 0 0;
    }

    .sheet-level-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      background: var(--soft);
      color: var(--text);
      margin-left: 8px;
      vertical-align: middle;
    }

    .sheet-level-badge.good {
      background: var(--good);
      color: #ffffff;
    }

    .sheet-level-badge.caution {
      background: var(--caution);
      color: #ffffff;
    }

    /* ── STARFIELD CANVAS ── */
    #starCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    body.theme-sacred #starCanvas,
    body.theme-royal #starCanvas {
      opacity: 1;
    }

    /* ── CONTENT ABOVE CANVAS ── */
    main {
      position: relative;
      z-index: 1;
    }

    /* fixed elements already have z-index set individually above canvas z-index:0 */

    /* ── RIPPLE EFFECT ── */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      transform: scale(0);
      animation: rippleAnim 0.55s linear forwards;
      pointer-events: none;
    }

    @keyframes rippleAnim {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    /* ── TITLE SHIMMER SWEEP ── */
    .page-head h1 {
      position: relative;
      overflow: visible;
    }

    .page-head h1::after {
      display: none;
    }

    @keyframes titleSweep {

      0%,
      60% {
        left: -100%;
      }

      100% {
        left: 160%;
      }
    }

    /* ── FLOATING PARTICLES ── */
    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      border-radius: 50%;
      animation: floatUp linear forwards;
      opacity: 0;
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.5);
      }

      15% {
        opacity: 0.7;
      }

      85% {
        opacity: 0.5;
      }

      100% {
        opacity: 0;
        transform: translateY(-110vh) scale(1.2);
      }
    }

    /* ── CARD TILT (CSS custom properties updated via JS) ── */
    .day-card {
      --rotX: 0deg;
      --rotY: 0deg;
      transform-style: preserve-3d;
      transform: perspective(600px) rotateX(var(--rotX)) rotateY(var(--rotY)) translateY(0);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      will-change: transform;
    }

    .day-card:active {
      transform: perspective(600px) rotateX(0deg) rotateY(0deg) scale(0.985) !important;
    }

    /* ── GOOD CARD SPARKLE ── */
    .sparkle {
      position: absolute;
      pointer-events: none;
      font-size: 14px;
      animation: sparklePop 0.7s ease forwards;
      z-index: 5;
    }

    @keyframes sparklePop {
      0% {
        opacity: 1;
        transform: scale(0.5) translateY(0);
      }

      60% {
        opacity: 1;
        transform: scale(1.3) translateY(-18px);
      }

      100% {
        opacity: 0;
        transform: scale(0.8) translateY(-32px);
      }
    }

    /* ── SCROLL REVEAL ── */
    .day-card.reveal-hidden {
      opacity: 0;
      transform: perspective(600px) translateY(20px);
    }

    .day-card.reveal-visible {
      animation: cardIn 0.38s ease both;
    }

    /* ── PULSE DOT on "today" card ── */
    .day-card.today-card::after {
      content: '';
      position: absolute;
      top: 8px;
      right: 8px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--focus);
      box-shadow: 0 0 0 0 var(--focus);
      animation: pulseDot 1.6s ease-in-out infinite;
    }

    @keyframes pulseDot {
      0% {
        box-shadow: 0 0 0 0 rgba(47, 128, 237, 0.6);
      }

      70% {
        box-shadow: 0 0 0 8px rgba(47, 128, 237, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(47, 128, 237, 0);
      }
    }

    /* ── SHEET SLIDE-UP ENHANCED ── */
    @keyframes sheetUp {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ── NUMBER COUNT-UP (for pills) ── */
    .summary-pill strong {
      display: block;
      font-size: clamp(19px, 5.5vw, 26px);
      line-height: 1;
      transition: transform 0.2s ease;
    }

    .summary-pill strong.pop {
      animation: numPop 0.35s ease;
    }

    /* ── RESET BUTTON ── */
    #resetBtn {
      position: absolute;
      top: 14px;
      right: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 1.5px solid var(--ctrl-border);
      background: var(--ctrl-bg);
      color: var(--ctrl-text);
      box-shadow: 0 4px 14px var(--shadow);
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      border-radius: 50%;
      opacity: 0.76;
      transition: opacity 0.2s, transform 0.18s ease, box-shadow 0.18s ease;
      line-height: 1;
      -webkit-text-fill-color: initial;
      filter: none;
      padding: 0;
      z-index: 2;
    }

    #resetBtn:hover {
      opacity: 1;
      box-shadow: 0 6px 18px var(--shadow);
    }

    #resetBtn:active {
      transform: scale(0.94);
    }

    #resetBtn.spinning {
      animation: resetSpin 0.45s ease forwards;
    }

    @keyframes resetSpin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

  </style>
</head>

<body data-age-mode="month">

  <script>
    const MONTHS = [
      { short: 'ม.ค.', full: 'มกราคม' },
      { short: 'ก.พ.', full: 'กุมภาพันธ์' },
      { short: 'มี.ค.', full: 'มีนาคม' },
      { short: 'เม.ย.', full: 'เมษายน' },
      { short: 'พ.ค.', full: 'พฤษภาคม' },
      { short: 'มิ.ย.', full: 'มิถุนายน' },
      { short: 'ก.ค.', full: 'กรกฎาคม' },
      { short: 'ส.ค.', full: 'สิงหาคม' },
      { short: 'ก.ย.', full: 'กันยายน' },
      { short: 'ต.ค.', full: 'ตุลาคม' },
      { short: 'พ.ย.', full: 'พฤศจิกายน' },
      { short: 'ธ.ค.', full: 'ธันวาคม' }
    ];

    const HOUSES = [
      {
        name: 'ตนุ',
        short: 'ตัวเราเอง การเริ่มต้น การตัดสินใจ',

    const state = {
      mode: 'month',
      filter: 'all',
      resultMonth: 'all',
      items: []

    const $ = (id) => document.getElementById(id);
    const AGE_SETTINGS_KEY = 'ageCycleSettings';
    const AGE_THEME_KEY = 'ageCycleTheme';
    const MUSIC_PLAYLIST = [
      {
        title: 'โชคชะตาแห่งดวงดาว - Destiny of the Stars',

      {
