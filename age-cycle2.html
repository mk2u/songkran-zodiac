    function currentBEYear() {
      return new Date().getFullYear() + 543;
    }

    function daysInMonth(adYear, monthIndex) {
      return new Date(adYear, monthIndex + 1, 0).getDate();
    }

    function dateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function monthKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
    }

    function formatDate(date, includeYear = false) {
      const base = `${date.getDate()} ${MONTHS[date.getMonth()].short}`;
      return includeYear ? `${base} ${date.getFullYear() + 543}` : base;
    }

    function levelLabel(level) {
      if (level === 'good') return 'ดี';
      if (level === 'caution') return 'ไม่ดี';
      return 'กลาง';
    }

    function adviceList(items) {
      return items.map((text) => `<li>${text}</li>`).join('');
    }

    function renderSheetMeaning(house) {
      return `
        <p class="sheet-lead">${house.meaning}</p>
        <p class="sheet-oracle">${house.oracle}</p>
        <p class="sheet-plain">${house.plain}</p>
        <div class="sheet-advice-grid">
          <section class="sheet-advice do">
            <strong class="sheet-advice-title">วันนี้ควรทำ</strong>
            <ul>${adviceList(house.do)}</ul>
          </section>
          <section class="sheet-advice watch">
            <strong class="sheet-advice-title">วันนี้ควรระวัง</strong>
            <ul>${adviceList(house.watch)}</ul>
          </section>
        </div>
        <div class="sheet-example"><strong>ตัวอย่าง:</strong> ${house.example}</div>
      `;
    }

    function populateSelects() {
      $('birthDay').innerHTML = Array.from({ length: 31 }, (_, i) => {
        const day = i + 1;
        return `<option value="${day}">${day}</option>`;
      }).join('');

      const monthOptions = MONTHS.map((month, index) => (
        `<option value="${index}">${month.full}</option>`
      )).join('');

      $('birthMonth').innerHTML = monthOptions;
      $('targetMonth').innerHTML = monthOptions;
      $('targetYear').value = currentBEYear();
      $('birthDay').value = '29';
      $('birthMonth').value = '0';
      $('targetMonth').value = '0';
    }

    function saveAgeSettings() {
      const settings = {
        mode: state.mode,
        filter: state.filter,
        resultMonth: state.resultMonth,
        birthDay: $('birthDay')?.value || '29',
        birthMonth: $('birthMonth')?.value || '0',
        targetMonth: $('targetMonth')?.value || '0',
        targetYear: $('targetYear')?.value || String(currentBEYear()),
        theme: document.body.classList.contains('theme-sacred')
          ? 'sacred'
          : document.body.classList.contains('theme-royal')
            ? 'royal'
            : 'solar'
      };
      localStorage.setItem(AGE_SETTINGS_KEY, JSON.stringify(settings));
      localStorage.setItem(AGE_THEME_KEY, settings.theme);
    }

    function restoreAgeSettings() {
      let settings = {};
      try {
        settings = JSON.parse(localStorage.getItem(AGE_SETTINGS_KEY) || '{}') || {};
      } catch (error) {
        settings = {};
      }

      const theme = settings.theme || localStorage.getItem(AGE_THEME_KEY) || 'solar';
      setTheme(theme, false);

      if (settings.birthDay) $('birthDay').value = settings.birthDay;
      if (settings.birthMonth) $('birthMonth').value = settings.birthMonth;
      if (settings.targetMonth) $('targetMonth').value = settings.targetMonth;
      if (settings.targetYear) $('targetYear').value = settings.targetYear;

      state.mode = settings.mode === 'year' ? 'year' : 'month';
      state.filter = ['all', 'good', 'caution'].includes(settings.filter) ? settings.filter : 'all';
      state.resultMonth = settings.resultMonth || 'all';
      document.body.dataset.ageMode = state.mode;
      document.querySelectorAll('[data-mode]').forEach((button) => {
        button.classList.toggle('active', button.dataset.mode === state.mode);
      });
      activateFilterButton();
    }

    function readInputs() {
      return {
        birthDay: Number($('birthDay').value),
        birthMonth: Number($('birthMonth').value),
        targetMonth: Number($('targetMonth').value),
        beYear: Number($('targetYear').value),
        adYear: Number($('targetYear').value) - 543
      };
    }

    function buildMonthly() {
      const { birthDay, targetMonth, beYear, adYear } = readInputs();

      if (!beYear) {
        return { error: 'กรุณาระบุปี พ.ศ.' };
      }

      // วันเริ่มต้น = min(วันเกิด, จำนวนวันในเดือนที่ดู) → เสมอเป็นตนุ
      const maxDayTarget = daysInMonth(adYear, targetMonth);
      const startDay = Math.min(birthDay, maxDayTarget);
      const start = new Date(adYear, targetMonth, startDay);

      // end = วันก่อน birthDay ของเดือนถัดไป
      const nextMonth = targetMonth === 11 ? 0 : targetMonth + 1;
      const nextYear = targetMonth === 11 ? adYear + 1 : adYear;
      const maxDayNext = daysInMonth(nextYear, nextMonth);
      // ถ้า birthDay > maxDayNext (เช่น เกิด 29 แต่ ก.พ. มี 28)
      // รอบจบที่ 28 ก.พ. → end = 29 ก.พ. (ไม่มีจริง = 1 มี.ค.) เพื่อให้ loop รวม 28
      const end = birthDay > maxDayNext
        ? new Date(nextYear, nextMonth, maxDayNext + 1)
        : new Date(nextYear, nextMonth, birthDay);

      const items = [];
      let index = 0;
      for (let cursor = new Date(start); cursor < end; cursor.setDate(cursor.getDate() + 1)) {
        const house = HOUSES[index % HOUSES.length];
        const d = new Date(cursor);
        items.push({ date: d, house, order: index, key: dateKey(d) });
        index++;
      }

      const endDisplay = new Date(end - 86400000);
      return {
        items,
        summary: `${startDay} ${MONTHS[targetMonth].short} ${beYear} – ${endDisplay.getDate()} ${MONTHS[endDisplay.getMonth()].short} ${endDisplay.getFullYear() + 543}`
      };
    }

    function nextAnnualStart(adYear, monthIndex, day) {
      const maxDay = daysInMonth(adYear + 1, monthIndex);
      return new Date(adYear + 1, monthIndex, Math.min(day, maxDay));
    }

    function cycleStartForMonth(adYear, monthIndex, day) {
      return new Date(adYear, monthIndex, Math.min(day, daysInMonth(adYear, monthIndex)));
    }

    function previousMonthParts(adYear, monthIndex) {
      return monthIndex === 0
        ? { year: adYear - 1, month: 11 }
        : { year: adYear, month: monthIndex - 1 };
    }

    function periodStartForDate(date, birthDay) {
      let start = cycleStartForMonth(date.getFullYear(), date.getMonth(), birthDay);
      if (date < start) {
        const previous = previousMonthParts(date.getFullYear(), date.getMonth());
        start = cycleStartForMonth(previous.year, previous.month, birthDay);
      }
      return start;
    }

    function buildAnnual() {
      const { birthDay, targetMonth, beYear, adYear } = readInputs();

      if (!beYear) {
        return { error: 'กรุณาระบุปี พ.ศ.' };
      }

      const start = cycleStartForMonth(adYear, targetMonth, birthDay);
      const endMonth = targetMonth === 0 ? 11 : targetMonth - 1;
      const endYear = targetMonth === 0 ? adYear : adYear + 1;
      const end = cycleStartForMonth(endYear, endMonth, birthDay);
      const items = [];

      for (let cursor = new Date(start); cursor < end; cursor.setDate(cursor.getDate() + 1)) {
        const itemDate = new Date(cursor);
        const periodStart = periodStartForDate(itemDate, birthDay);
        const offset = Math.round((itemDate - periodStart) / 86400000);
        const house = HOUSES[offset % HOUSES.length];
        items.push({
          date: itemDate,
          house,
          order: offset,
          key: dateKey(cursor),
          periodKey: dateKey(periodStart)
        });
      }

      const endDisplay = new Date(end - 86400000);
      return {
        items,
        summary: `${formatDate(start, true)} ถึง ${formatDate(endDisplay, true)}`
      };
    }

    function periodEndForStart(starts, index, items) {
      if (starts[index + 1]) {
        const nextStart = starts[index + 1].date;
        return new Date(nextStart.getFullYear(), nextStart.getMonth(), nextStart.getDate() - 1);
      }
      return items[items.length - 1]?.date || starts[index].date;
    }

    function periodOptionLabel(start, end) {
      return `รอบ ${formatDate(start, true)} – ${formatDate(end, true)}`;
    }

    function buildMonthOptions(items) {
      const starts = items.filter((item) => item.order === 0);
      const options = starts.map((item, index) => {
        const end = periodEndForStart(starts, index, items);
        return {
          key: item.periodKey || item.key,
          label: periodOptionLabel(item.date, end)
        };
      });

      $('resultMonth').innerHTML = [
        '<option value="all">ทุกเดือนในรอบนี้</option>',
        ...options.map((option) => `<option value="${option.key}">${option.label}</option>`)
      ].join('');

      if (!options.some((option) => option.key === state.resultMonth)) {
        state.resultMonth = 'all';
      }
      $('resultMonth').value = state.resultMonth;
    }

    function filteredItems() {
      return state.items.filter((item) => {
        if (state.filter !== 'all' && item.house.level !== state.filter) return false;
        if (state.mode === 'year' && state.resultMonth !== 'all' && item.periodKey !== state.resultMonth) return false;
        return true;
      });
    }

    function renderSummaryStrip() {
      const counts = state.items.reduce((acc, item) => {
        acc[item.house.level] = (acc[item.house.level] || 0) + 1;
        return acc;
      }, { good: 0, neutral: 0, caution: 0 });

      $('summaryStrip').innerHTML = `
        <div class="summary-pill good"><span class="pill-icon">✨</span><strong>${counts.good || 0}</strong><span>วันดี</span></div>
        <div class="summary-pill"><span class="pill-icon">☁️</span><strong>${counts.neutral || 0}</strong><span>วันกลาง</span></div>
        <div class="summary-pill caution"><span class="pill-icon">⚠️</span><strong>${counts.caution || 0}</strong><span>วันไม่ดี</span></div>
      `;
    }

    function render() {
      showSkeletons(6);
      const result = state.mode === 'month' ? buildMonthly() : buildAnnual();

      if (result.error) {
        state.items = [];
        $('rangeSummary').textContent = '';
        $('summaryStrip').innerHTML = '';
        $('notice').textContent = result.error;
        $('results').innerHTML = '<div class="empty-state">เลือกวันที่ใหม่อีกครั้ง</div>';
        return;
      }

      state.items = result.items;
      $('rangeSummary').textContent = result.summary;
      $('notice').textContent = '';

      if (state.mode === 'year') {
        buildMonthOptions(state.items);
      }

      renderSummaryStrip();
      renderFilterCounts();
      renderCards();
    }

    function renderFilterCounts() {
      const counts = { all: state.items.length, good: 0, neutral: 0, caution: 0 };
      state.items.forEach((item) => {
        counts[item.house.level] = (counts[item.house.level] || 0) + 1;
      });
      document.querySelectorAll('[data-filter]').forEach((button) => {
        const filter = button.dataset.filter;
        const count = filter === 'all' ? counts.all : (filter === 'good' ? counts.good : counts.caution);
        const existing = button.querySelector('.filter-count');
        if (existing) existing.remove();
        if (count > 0) {
          const badge = document.createElement('span');
          badge.className = 'filter-count';
          badge.textContent = count;
          button.appendChild(badge);
        }
      });
    }

    function showSkeletons(count = 4) {
      $('results').innerHTML = Array.from({ length: count }, () => `<div class="skeleton-card"></div>`).join('');
    }

    function renderCards() {
      const items = filteredItems();
      if (!items.length) {
        $('results').innerHTML = '<div class="empty-state">ไม่มีวันที่ตรงกับตัวกรองนี้</div>';
        return;
      }

      $('results').innerHTML = items.map((item, index) => {
        const includeYear = state.mode === 'year';
        const level = item.house.level;
        const levelClass = level === 'neutral' ? '' : level;
        const delay = Math.min(index, 16) * 0.025;
        return `
          <button class="day-card ${levelClass}" type="button" data-key="${item.key}" style="animation-delay: ${delay}s">
            <span class="date-line">
              ${formatDate(item.date, false)}
              ${includeYear ? `<span class="date-year">${item.date.getFullYear() + 543}</span>` : ''}
            </span>
            <span class="house-line">
              <span class="house-name">${item.house.name}</span>
              <span class="house-short">${item.house.short}</span>
            </span>
            <span class="level">${levelLabel(level)}</span>
          </button>
        `;
      }).join('');
    }

    function openSheet(key) {
      const item = state.items.find((entry) => entry.key === key);
      if (!item) return;
      const level = item.house.level;
      const badgeClass = level === 'neutral' ? '' : level;
      $('sheetTitle').innerHTML = `${item.house.name}<span class="sheet-level-badge ${badgeClass}">${levelLabel(level)}</span>`;
      $('sheetDate').textContent = `${formatDate(item.date, true)}`;
      $('sheetMeaning').innerHTML = renderSheetMeaning(item.house);
      $('sheetOverlay').classList.add('open');
    }

    function closeSheet() {
      $('sheetOverlay').classList.remove('open');
    }

    function setMode(mode) {
      state.mode = mode;
      state.resultMonth = 'all';
      document.body.dataset.ageMode = mode;
      document.querySelectorAll('[data-mode]').forEach((button) => {
        button.classList.toggle('active', button.dataset.mode === mode);
      });
      render();
      saveAgeSettings();
    }

    function setFilter(filter) {
      state.filter = filter;
      document.querySelectorAll('[data-filter]').forEach((button) => {
        button.classList.toggle('active', button.dataset.filter === filter);
      });
      renderCards();
      saveAgeSettings();
    }

    function activateFilterButton() {
      document.querySelectorAll('[data-filter]').forEach((button) => {
        button.classList.toggle('active', button.dataset.filter === state.filter);
      });
    }

    function revealToday(today) {
      const key = dateKey(today);
      const card = document.querySelector(`.day-card[data-key="${key}"]`);
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.focus({ preventScroll: true });
        openSheet(key);
        $('notice').textContent = '';
      } else {
        $('notice').textContent = 'วันนี้ไม่ได้อยู่ในผลลัพธ์ที่กำลังแสดง';
      }
    }

    function jumpToToday() {
      const today = new Date();
      state.filter = 'all';
      activateFilterButton();

      if (state.mode === 'month') {
        const birthDay = Number($('birthDay').value);
        let month = today.getMonth();
        let year = today.getFullYear();

        // ถ้าวันนี้ยังไม่ถึงวันเกิดในเดือนนี้ → ย้อนไปรอบเดือนที่แล้ว
        if (today.getDate() < birthDay) {
          month -= 1;
          if (month < 0) { month = 11; year -= 1; }
        }

        $('targetMonth').value = String(month);
        $('targetYear').value = String(year + 543);
        render();
        requestAnimationFrame(() => revealToday(today));
        return;
      }

      if (state.mode === 'year') {
        const birthDay = Number($('birthDay').value);
        let month = today.getMonth();
        let year = today.getFullYear();

        // ใช้เดือนรอบล่าสุดเหมือนรายเดือน แล้วต่อเป็นรอบปีจากเดือนนั้น
        if (today.getDate() < birthDay) {
          month -= 1;
          if (month < 0) { month = 11; year -= 1; }
        }

        $('targetMonth').value = String(month);
        $('targetYear').value = String(year + 543);
        render();
        requestAnimationFrame(() => revealToday(today));
        return;
      }

      renderCards();
      requestAnimationFrame(() => revealToday(today));
    }

    async function copySummary() {
      const items = filteredItems().slice(0, 24);
      if (!items.length) return;
      const lines = items.map((item) => (
        `${formatDate(item.date, true)}: ${item.house.name} (${levelLabel(item.house.level)})`
      ));
      const more = filteredItems().length > items.length ? `\n...อีก ${filteredItems().length - items.length} วัน` : '';
      const text = [`อายุจรประจำปี`, $('rangeSummary').textContent, ...lines].join('\n') + more;
      const copyBtn = $('copyBtn');
      try {
        await navigator.clipboard.writeText(text);
        $('notice').textContent = 'คัดลอกแล้ว ✓';
        copyBtn.textContent = '✓ คัดลอกแล้ว';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = '📋 คัดลอกผลย่อ';
          copyBtn.classList.remove('copied');
          $('notice').textContent = '';
        }, 2200);
      } catch (error) {
        $('notice').textContent = text;
      }
    }

    function cssVar(name, fallback) {
      const value = getComputedStyle(document.body).getPropertyValue(name).trim();
      return value || fallback;
    }

    function roundRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + w, y, x + w, y + h, radius);
      ctx.arcTo(x + w, y + h, x, y + h, radius);
      ctx.arcTo(x, y + h, x, y, radius);
      ctx.arcTo(x, y, x + w, y, radius);
      ctx.closePath();
    }

    function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight, maxLines = 2) {
      const words = String(text).split(' ');
      const lines = [];
      let line = '';
      words.forEach((word) => {
        const test = line ? `${line} ${word}` : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = word;
        } else {
          line = test;
        }
      });
      if (line) lines.push(line);
      lines.slice(0, maxLines).forEach((lineText, index) => {
        const suffix = index === maxLines - 1 && lines.length > maxLines ? '…' : '';
        ctx.fillText(lineText + suffix, x, y + index * lineHeight);
      });
      return Math.min(lines.length, maxLines) * lineHeight;
    }

    function resultMonthLabel() {
      if (state.mode !== 'year') return '';
      if (state.resultMonth === 'all') return 'ทุกเดือนในรอบนี้';
      const starts = state.items.filter((item) => item.order === 0);
      const index = starts.findIndex((item) => item.periodKey === state.resultMonth || item.key === state.resultMonth);
      if (index < 0) return 'ทุกเดือนในรอบนี้';
      return periodOptionLabel(starts[index].date, periodEndForStart(starts, index, state.items));
    }

    function exportContextLines(itemCount) {
      const { birthDay, birthMonth, targetMonth, beYear } = readInputs();
      const filterLabel = state.filter === 'good'
        ? 'เฉพาะวันดี'
        : state.filter === 'caution'
          ? 'เฉพาะวันไม่ดี'
          : 'ทั้งหมด';

      if (state.mode === 'year') {
        return [
          `วันที่เกิด: ${birthDay}`,
          `เริ่มเดือน: ${MONTHS[targetMonth].full} พ.ศ. ${beYear} | เดือนที่แสดง: ${resultMonthLabel()}`,
          `ตัวกรอง: ${filterLabel} | แสดง ${itemCount} วัน`
        ];
      }

      return [
        `วันที่ตั้งต้น: ${birthDay} ${MONTHS[targetMonth].full}`,
        `เดือนที่ดู: ${MONTHS[targetMonth].full} | ปีที่ดู: พ.ศ. ${beYear}`,
        `ตัวกรอง: ${filterLabel} | แสดงครบ ${itemCount} วัน`
      ];
    }

    function createExportCanvas() {
      const items = filteredItems();
      const longAnnual = state.mode === 'year' && items.length > 90;
      const columns = longAnnual ? 2 : 1;
      const rowHeight = longAnnual ? 72 : 96;
      const cardHeight = longAnnual ? 62 : 80;
      const headerHeight = 480;
      const footerHeight = 100;
      const rows = Math.ceil(items.length / columns);
      const W = 1200;
      const H = Math.max(960, headerHeight + rows * rowHeight + footerHeight);
      const canvas = document.createElement('canvas');
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');

      // ── อ่านสีจาก theme ปัจจุบัน ──
      const isDark = document.body.classList.contains('theme-sacred') || document.body.classList.contains('theme-royal');
      const isRoyal = document.body.classList.contains('theme-royal');
      const bg = cssVar('--bg', isDark ? '#03010a' : '#ffffff');
      const textColor = cssVar('--text', isDark ? '#f0e6c8' : '#1a1a1a');
      const muted = cssVar('--muted', isDark ? '#bba979' : '#656565');
      const cardBg = cssVar('--surface', isDark ? '#100923' : '#ffffff');
      const gold = cssVar('--card-border', isDark ? '#e8c84a' : '#c8951a');
      const good = cssVar('--good', '#147d49');
      const goodBg = cssVar('--good-bg', '#e9f7ef');
      const caution = cssVar('--caution', '#b3261e');
      const cautionBg = cssVar('--caution-bg', '#fff0ee');
      const soft = cssVar('--soft', '#f6f3ea');
      const counts = state.items.reduce((acc, item) => {
        acc[item.house.level] = (acc[item.house.level] || 0) + 1;
        return acc;
      }, { good: 0, neutral: 0, caution: 0 });

      // ── พื้นหลัง gradient ──
      if (isDark) {
        const bgGrad = ctx.createLinearGradient(0, 0, W, H);
        if (isRoyal) {
          bgGrad.addColorStop(0, '#021a0a');
          bgGrad.addColorStop(0.5, '#061a10');
          bgGrad.addColorStop(1, '#0a2e1c');
        } else {
          bgGrad.addColorStop(0, '#03010a');
          bgGrad.addColorStop(0.5, '#0e0826');
          bgGrad.addColorStop(1, '#1b1038');
        }
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, W, H);

        // วาดดาวสุ่ม
        const rng = (n) => Math.floor(Math.random() * n);
        for (let i = 0; i < 220; i++) {
          const sx = rng(W), sy = rng(H);
          const sr = Math.random() * 1.3 + 0.2;
          const sa = Math.random() * 0.7 + 0.2;
          ctx.beginPath();
          ctx.arc(sx, sy, sr, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,245,200,${sa})`;
          ctx.fill();
        }
      } else {
        // light theme: พื้นอ่อนๆ gradient
        const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
        bgGrad.addColorStop(0, '#fffbf0');
        bgGrad.addColorStop(1, '#f6f3ea');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, W, H);
      }

      // ── เส้นขอบทองด้านบนและล่าง ──
      ctx.strokeStyle = gold;
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(W, 0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, H - 1); ctx.lineTo(W, H - 1); ctx.stroke();

      // ── ตกแต่งมุมด้วยวงกลมทอง ──
      [[30, 30], [W - 30, 30], [30, H - 30], [W - 30, H - 30]].forEach(([cx, cy]) => {
        ctx.beginPath();
        ctx.arc(cx, cy, 18, 0, Math.PI * 2);
        ctx.strokeStyle = gold;
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, 8, 0, Math.PI * 2);
        ctx.fillStyle = gold;
        ctx.fill();
      });

      // ── ชื่อหัวข้อ gradient ──
      ctx.textAlign = 'center';
      const titleGrad = ctx.createLinearGradient(W / 2 - 280, 0, W / 2 + 280, 0);
      titleGrad.addColorStop(0, gold);
      titleGrad.addColorStop(0.5, isDark ? '#fffde0' : '#c8951a');
      titleGrad.addColorStop(1, gold);
      ctx.fillStyle = titleGrad;
      ctx.font = "800 76px 'K2D', sans-serif";
      ctx.fillText('อายุจรประจำปี', W / 2, 100);

      // กรอบใต้ชื่อ
      ctx.strokeStyle = gold;
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.4;
      ctx.beginPath(); ctx.moveTo(180, 118); ctx.lineTo(W - 180, 118); ctx.stroke();
      ctx.globalAlpha = 1;

      // ── subtitle ──
      ctx.fillStyle = muted;
      ctx.font = "700 34px 'K2D', sans-serif";
      ctx.fillText($('rangeSummary').textContent || '', W / 2, 162);

      // ── กล่อง context info ──
      roundRect(ctx, 70, 188, 1060, 126, 24);
      if (isDark) {
        ctx.fillStyle = 'rgba(255,215,0,0.07)';
      } else {
        ctx.fillStyle = 'rgba(200,149,26,0.06)';
      }
      ctx.fill();
      ctx.strokeStyle = gold;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = textColor;
      ctx.font = "700 29px 'K2D', sans-serif";
      exportContextLines(items.length).forEach((line, i) => {
        ctx.fillText(line, W / 2, 228 + i * 36);
      });

      // ── pills สรุป ──
      const pillY = 342;
      const pillW = 330, pillH = 118, pillGap = (1060 - pillW * 3) / 2;
      const pills = [
        { label: 'วันดี ✨', count: counts.good || 0, fill: goodBg, border: good, num: good },
        { label: 'วันกลาง', count: counts.neutral || 0, fill: isDark ? 'rgba(255,215,0,0.06)' : soft, border: gold, num: textColor },
        { label: 'วันไม่ดี ⚠️', count: counts.caution || 0, fill: cautionBg, border: caution, num: caution },
      ];
      pills.forEach((pill, i) => {
        const px = 70 + i * (pillW + pillGap);
        roundRect(ctx, px, pillY, pillW, pillH, 20);
        ctx.fillStyle = pill.fill;
        ctx.fill();
        ctx.strokeStyle = pill.border;
        ctx.lineWidth = 3;
        ctx.stroke();
        // glow
        ctx.shadowColor = pill.border;
        ctx.shadowBlur = 14;
        ctx.strokeStyle = pill.border;
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.fillStyle = pill.num;
        ctx.font = "800 46px 'K2D', sans-serif";
        ctx.fillText(String(pill.count), px + pillW / 2, pillY + 62);
        ctx.font = "700 26px 'K2D', sans-serif";
        ctx.fillStyle = muted;
        ctx.fillText(pill.label, px + pillW / 2, pillY + 96);
      });

      // ── เส้นคั่นก่อน cards ──
      ctx.strokeStyle = gold;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.3;
      ctx.beginPath(); ctx.moveTo(70, headerHeight - 14); ctx.lineTo(W - 70, headerHeight - 14); ctx.stroke();
      ctx.globalAlpha = 1;

      // ── วาด cards ──
      ctx.textAlign = 'left';
      const startY = headerHeight;
      const colW = longAnnual ? 515 : 1060;
      const colGap = 30;

      items.forEach((item, index) => {
        const col = index % columns;
        const row = Math.floor(index / columns);
        const x = 70 + col * (colW + colGap);
        const y = startY + row * rowHeight;
        const level = item.house.level;
        const accent = level === 'good' ? good : level === 'caution' ? caution : (isDark ? '#6655aa' : '#888888');
        const fill = level === 'good' ? goodBg : level === 'caution' ? cautionBg : cardBg;

        // card background
        roundRect(ctx, x, y, colW, cardHeight, 18);
        ctx.fillStyle = fill;
        ctx.fill();
        ctx.strokeStyle = accent;
        ctx.lineWidth = longAnnual ? 2 : 2.5;
        ctx.stroke();

        // กรอบ glow สำหรับ good/caution
        if (level !== 'neutral') {
          ctx.shadowColor = accent;
          ctx.shadowBlur = 12;
          ctx.strokeStyle = accent;
          ctx.stroke();
          ctx.shadowBlur = 0;
        }

        // แถบสีซ้าย
        const barW = longAnnual ? 10 : 13;
        roundRect(ctx, x, y, barW, cardHeight, 18);
        ctx.fillStyle = accent;
        ctx.fill();
        // ตัดมุมขวาของแถบให้ตรง
        ctx.fillRect(x + barW / 2, y, barW / 2, cardHeight);

        // วันที่
        ctx.fillStyle = textColor;
        ctx.font = longAnnual ? "800 22px 'K2D', sans-serif" : "800 30px 'K2D', sans-serif";
        ctx.fillText(formatDate(item.date, state.mode === 'year'), x + barW + 18, y + (longAnnual ? 36 : 46));

        // ชื่อเรือน
        ctx.font = longAnnual ? "800 23px 'K2D', sans-serif" : "800 31px 'K2D', sans-serif";
        ctx.fillStyle = accent;
        const nameX = longAnnual ? x + 200 : x + 240;
        ctx.fillText(item.house.name, nameX, y + (longAnnual ? 30 : 36));

        // คำอธิบายสั้น
        ctx.font = longAnnual ? "600 16px 'K2D', sans-serif" : "600 22px 'K2D', sans-serif";
        ctx.fillStyle = muted;
        drawWrappedText(ctx, item.house.short, nameX, y + (longAnnual ? 50 : 62), longAnnual ? 200 : 620, longAnnual ? 19 : 26, 1);

        // badge
        ctx.textAlign = 'center';
        const bW = longAnnual ? 80 : 104;
        const bH = longAnnual ? 28 : 36;
        const bX = x + colW - bW - 20;
        const bY = y + (cardHeight - bH) / 2;
        roundRect(ctx, bX, bY, bW, bH, bH / 2);
        ctx.fillStyle = level === 'good' ? good : level === 'caution' ? caution : (isDark ? 'rgba(255,215,0,0.15)' : soft);
        ctx.fill();
        ctx.fillStyle = level === 'neutral' ? (isDark ? gold : '#555') : '#ffffff';
        ctx.font = longAnnual ? "800 16px 'K2D', sans-serif" : "800 20px 'K2D', sans-serif";
        ctx.fillText(levelLabel(level), bX + bW / 2, bY + (longAnnual ? 20 : 25));
        ctx.textAlign = 'left';
      });

      // ── footer ──
      ctx.textAlign = 'center';
      // เส้นคั่น footer
      ctx.strokeStyle = gold;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.3;
      ctx.beginPath(); ctx.moveTo(70, H - footerHeight + 12); ctx.lineTo(W - 70, H - footerHeight + 12); ctx.stroke();
      ctx.globalAlpha = 1;

      const footerGrad = ctx.createLinearGradient(W / 2 - 200, 0, W / 2 + 200, 0);
      footerGrad.addColorStop(0, gold);
      footerGrad.addColorStop(0.5, isDark ? '#fffde0' : '#c8951a');
      footerGrad.addColorStop(1, gold);
      ctx.fillStyle = footerGrad;
      ctx.font = "700 26px 'K2D', sans-serif";
      ctx.fillText('✨ อายุจรประจำปี — โหราศาสตร์ไทย ✨', W / 2, H - footerHeight + 48);
      ctx.fillStyle = muted;
      ctx.font = "600 22px 'K2D', sans-serif";
      ctx.fillText('Developed with ❤️ by คนโบราณ', W / 2, H - footerHeight + 80);

      return canvas;
    }

    function exportFileName() {
      const { birthDay, birthMonth, targetMonth, beYear } = readInputs();
      const day = String(birthDay).padStart(2, '0');
      const mode = state.mode === 'year'
        ? `annual-start-${String(targetMonth + 1).padStart(2, '0')}-day-${day}`
        : `month-${String(targetMonth + 1).padStart(2, '0')}-start-${day}`;
      const resultMonthPart = state.mode === 'year' && state.resultMonth !== 'all' ? `-${state.resultMonth}` : '';
      const filterPart = state.filter === 'all' ? '' : `-${state.filter}`;
      return `age-cycle-${beYear}-${mode}${resultMonthPart}${filterPart}.png`;
    }

    function canvasToBlob(canvas) {
      return new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
    }

    function canvasToPngBlobSync(canvas) {
      const dataUrl = canvas.toDataURL('image/png');
      const parts = dataUrl.split(',');
      const binary = atob(parts[1]);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return new Blob([bytes], { type: 'image/png' });
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1200);
    }

    function showShareNotice(message) {
      const notice = $('shareNotice');
      if (!notice) return;
      notice.textContent = message;
      notice.classList.add('show');
      clearTimeout(shareNoticeTimer);
      shareNoticeTimer = setTimeout(() => notice.classList.remove('show'), 3600);
    }

    async function saveCurrentImage() {
      render();
      const canvas = createExportCanvas();
      const blob = await canvasToBlob(canvas);
      if (!blob) return;
      downloadBlob(blob, exportFileName());
      activateShareGroup();
    }

    async function shareCurrentImage() {
      render();
      const canvas = createExportCanvas();
      const filename = exportFileName();
      const blob = canvasToPngBlobSync(canvas);
      if (!blob) return;
      if (typeof File === 'undefined') {
        showShareNotice('เครื่องนี้ไม่รองรับแชร์ไฟล์ภาพ กำลังบันทึกรูปแทน');
        downloadBlob(blob, filename);
        activateShareGroup();
        return;
      }

      const file = new File([blob], filename, { type: 'image/png' });
      const shareData = {
        title: 'อายุจรประจำปี',
        text: $('rangeSummary').textContent || 'อายุจรประจำปี',
        files: [file]
      };

      if (navigator.share && window.isSecureContext && (!navigator.canShare || navigator.canShare(shareData))) {
        try {
          await navigator.share(shareData);
          activateShareGroup();
          return;
        } catch (error) {
          if (error && error.name === 'AbortError') return;
          showShareNotice('แชร์ไม่สำเร็จ กำลังบันทึกรูปแทน');
        }
      } else {
        showShareNotice('แชร์ตรงต้องเปิดผ่าน HTTPS/localhost กำลังบันทึกรูปแทน');
      }
      downloadBlob(blob, filename);
      activateShareGroup();
    }

    function activateShareGroup() {
      const group = $('shareGroup');
      if (!group) return;
      group.classList.add('active');
      clearTimeout(shareGroupTimer);
      shareGroupTimer = setTimeout(() => group.classList.remove('active'), 5000);
    }

    function normalizeMusicIndex(index) {
      return ((Number(index) || 0) % MUSIC_PLAYLIST.length + MUSIC_PLAYLIST.length) % MUSIC_PLAYLIST.length;
    }

    function getStoredMusicIndex() {
      return normalizeMusicIndex(localStorage.getItem('zodiacMusicTrackIndex'));
    }

    function restoredMusicTime() {
      const saved = Number(localStorage.getItem('zodiacMusicTime')) || 0;
      const wasPlaying = localStorage.getItem('zodiacMusicPlaying') === 'true';
      const savedAt = Number(localStorage.getItem('zodiacMusicLastSavedAt')) || 0;
      if (!wasPlaying || !savedAt) return saved;
      return saved + Math.max(0, (Date.now() - savedAt) / 1000);
    }

    function setMusicTrack(index, startTime = 0) {
      const music = $('bgMusic');
      if (!music) return null;
      const safeIndex = normalizeMusicIndex(index);
      const track = MUSIC_PLAYLIST[safeIndex];
      if (!music.src || music.src !== track.url) {
        music.src = track.url;
        music.load();
      }
      music.dataset.trackIndex = String(safeIndex);
      music.dataset.trackTitle = track.title;
      localStorage.setItem('zodiacMusicTrackIndex', String(safeIndex));

      const time = Number(startTime) || 0;
      if (time > 0) {
        const applyTime = () => {
          try {
            const maxTime = Number.isFinite(music.duration) ? Math.max(0, music.duration - 0.5) : time;
            music.currentTime = Math.min(time, maxTime);
          } catch (error) {
            console.warn('Could not restore music time', error);
          }
        };
        if (music.readyState >= 1) applyTime();
        else music.addEventListener('loadedmetadata', applyTime, { once: true });
      }
      return track;
    }

    function updateMusicButton(playing) {
      const button = $('toggleMusic');
      if (!button) return;
      button.textContent = playing ? '🔊' : '🎵';
      button.style.background = playing ? '#00ff00' : 'linear-gradient(135deg, #ffd700, #b8860b)';
    }

    function saveMusicState() {
      const music = $('bgMusic');
      if (!music) return;
      if (Number.isFinite(music.currentTime)) {
        localStorage.setItem('zodiacMusicTime', String(music.currentTime));
      }
      localStorage.setItem('zodiacMusicTrackIndex', music.dataset.trackIndex || '0');
      localStorage.setItem('zodiacMusicPlaying', music.paused ? 'false' : 'true');
      localStorage.setItem('zodiacMusicLastSavedAt', String(Date.now()));
    }

    function playCurrentMusic() {
      const music = $('bgMusic');
      if (!music) return Promise.resolve();
      musicPlaying = true;
      return music.play().then(() => {
        updateMusicButton(true);
        localStorage.setItem('zodiacMusicPlaying', 'true');
        localStorage.setItem('zodiacMusicLastSavedAt', String(Date.now()));
      }).catch((error) => {
        musicPlaying = false;
        updateMusicButton(false);
        showShareNotice('แตะปุ่มเพลงเพื่อเล่นต่อ');
        console.warn('Audio play blocked', error);
      });
    }

    function playNextMusicTrack() {
      const music = $('bgMusic');
      const current = music ? Number(music.dataset.trackIndex || getStoredMusicIndex()) : getStoredMusicIndex();
      setMusicTrack(current + 1, 0);
      localStorage.setItem('zodiacMusicTime', '0');
      localStorage.setItem('zodiacMusicLastSavedAt', String(Date.now()));
      playCurrentMusic();
    }

    function toggleMusic() {
      const music = $('bgMusic');
      if (!music) return;
      if (music.paused) {
        setMusicTrack(getStoredMusicIndex(), restoredMusicTime());
        playCurrentMusic();
      } else {
        musicPlaying = false;
        music.pause();
        updateMusicButton(false);
        const volume = $('volContainer');
        volume.classList.add('vol-hidden');
        saveMusicState();
        localStorage.setItem('zodiacMusicPlaying', 'false');
      }
    }

    function showVolume() {
      const volume = $('volContainer');
      const isHidden = volume.classList.contains('vol-hidden');
      if (isHidden) {
        volume.classList.remove('vol-hidden');
      } else {
        volume.classList.add('vol-hidden');
      }
      clearTimeout(volTimer);
      if (!isHidden) return;
      volTimer = setTimeout(() => {
        if (musicPlaying) {
          volume.classList.add('vol-hidden');
        }
      }, 3000);
    }

    function setVolume(value) {
      const music = $('bgMusic');
      if (!music) return;
      music.volume = value;
      localStorage.setItem('zodiacMusicVolume', value);
      const volume = $('volContainer');
      volume.classList.remove('vol-hidden');
      clearTimeout(volTimer);
      volTimer = setTimeout(() => {
        if (musicPlaying) {
          volume.classList.add('vol-hidden');
        }
      }, 3000);
    }

    function activateAudioGroup() {
      const group = $('audioGroup');
      if (!group) return;
      group.classList.add('active');
      clearTimeout(audioGroupTimer);
      audioGroupTimer = setTimeout(() => {
        group.classList.remove('active');
        const volume = $('volContainer');
        volume.classList.add('vol-hidden');
      }, 5000);
    }

    function initMusic() {
      const music = $('bgMusic');
      if (!music) return;
      const savedVol = localStorage.getItem('zodiacMusicVolume');
      setMusicTrack(getStoredMusicIndex(), restoredMusicTime());
      music.addEventListener('ended', playNextMusicTrack);
      if (savedVol) {
        music.volume = Number(savedVol);
        const volumeInput = document.querySelector('#volContainer input');
        if (volumeInput) volumeInput.value = savedVol;
      }
      if (localStorage.getItem('zodiacMusicPlaying') === 'true') {
        playCurrentMusic();
      } else {
        updateMusicButton(false);
      }
    }

    function setTheme(theme, persist = true) {
      document.body.classList.remove('theme-sacred', 'theme-royal');
      if (theme !== 'solar') {
        document.body.classList.add(`theme-${theme}`);
      }
      document.querySelectorAll('[data-theme]').forEach((button) => {
        button.classList.toggle('active', button.dataset.theme === theme);
      });
      $('themeSelector').classList.remove('open');
      if (persist) {
        localStorage.setItem(AGE_THEME_KEY, theme);
        saveAgeSettings();
      }
    }

    function bindEvents() {
      $('themeSelector').querySelector('.theme-main-btn').addEventListener('click', (event) => {
        event.stopPropagation();
        $('themeSelector').classList.toggle('open');
      });

      $('resetBtn')?.addEventListener('click', () => {
        const today = new Date();
        const btn = $('resetBtn');
        btn.classList.remove('spinning');
        requestAnimationFrame(() => btn.classList.add('spinning'));
        btn.addEventListener('animationend', () => btn.classList.remove('spinning'), { once: true });

        $('birthDay').value = String(today.getDate());
        $('birthMonth').value = String(today.getMonth());
        $('targetMonth').value = String(today.getMonth());
        $('targetYear').value = String(today.getFullYear() + 543);
        state.filter = 'all';
        activateFilterButton();
        render();
      });

      $('audioGroup').addEventListener('touchstart', activateAudioGroup, { passive: true });
      $('toggleMusic').addEventListener('click', (event) => {
        event.stopPropagation();
        toggleMusic();
      });
      $('volToggle').addEventListener('click', (event) => {
        event.stopPropagation();
        showVolume();
      });
      document.querySelector('#volContainer input').addEventListener('input', (event) => {
        setVolume(event.target.value);
      });

      $('shareGroup').addEventListener('click', activateShareGroup);
      $('shareGroup').addEventListener('touchstart', activateShareGroup, { passive: true });
      $('shareImageBtn').addEventListener('click', (event) => {
        event.stopPropagation();
        shareCurrentImage();
      });
      $('saveImageFloatBtn').addEventListener('click', (event) => {
        event.stopPropagation();
        saveCurrentImage();
      });

      document.querySelectorAll('[data-theme]').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          setTheme(button.dataset.theme);
        });
      });

      document.addEventListener('click', (event) => {
        if (!$('themeSelector').contains(event.target)) {
          $('themeSelector').classList.remove('open');
        }
      });

      document.querySelectorAll('[data-mode]').forEach((button) => {
        button.addEventListener('click', () => setMode(button.dataset.mode));
      });

      document.querySelectorAll('[data-filter]').forEach((button) => {
        button.addEventListener('click', () => setFilter(button.dataset.filter));
      });

      ['birthDay', 'birthMonth', 'targetMonth', 'targetYear'].forEach((id) => {
        $(id).addEventListener('input', () => {
          render();
          saveAgeSettings();
        });
      });

      $('resultMonth').addEventListener('input', () => {
        state.resultMonth = $('resultMonth').value;
        renderCards();
        saveAgeSettings();
      });

      $('todayBtn').addEventListener('click', jumpToToday);
      $('copyBtn').addEventListener('click', copySummary);
      $('sheetClose').addEventListener('click', closeSheet);
      $('sheetOverlay').addEventListener('click', (event) => {
        if (event.target === $('sheetOverlay')) closeSheet();
      });

      $('results').addEventListener('click', (event) => {
        const card = event.target.closest('.day-card');
        if (card) openSheet(card.dataset.key);
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeSheet();
      });

      document.querySelectorAll('a').forEach((link) => {
        link.addEventListener('click', () => {
          saveMusicState();
          saveAgeSettings();
        });
      });

      window.addEventListener('pagehide', () => {
        saveMusicState();
        saveAgeSettings();
      });
      window.addEventListener('beforeunload', () => {
        saveMusicState();
        saveAgeSettings();
      });
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') {
          saveMusicState();
          saveAgeSettings();
        }
      });
    }

    populateSelects();
    restoreAgeSettings();
    bindEvents();
    initMusic();
    render();
    setInterval(() => {
      const music = $('bgMusic');
      if (music && !music.paused) saveMusicState();
    }, 1000);

    /* ═══════════════════════════════════════════════
       VISUAL FX — starfield, particles, ripple, tilt
       ═══════════════════════════════════════════════ */

    /* ── STARFIELD ── */
    (function initStarfield() {
      const canvas = document.getElementById('starCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let stars = [];
      let raf;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = Array.from({ length: 160 }, () => ({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.4 + 0.3,
          speed: Math.random() * 0.25 + 0.05,
          alpha: Math.random() * 0.7 + 0.2,
          drift: (Math.random() - 0.5) * 0.15,
          twinkleSpeed: Math.random() * 0.02 + 0.005,
          twinkleOffset: Math.random() * Math.PI * 2,
        }));
      }

      function draw(time) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const t = time / 1000;
        stars.forEach((s) => {
          const twinkle = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.twinkleSpeed * 60 + s.twinkleOffset));
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 245, 200, ${s.alpha * twinkle})`;
          ctx.fill();
          s.y -= s.speed;
          s.x += s.drift;
          if (s.y < -2) { s.y = canvas.height + 2; s.x = Math.random() * canvas.width; }
          if (s.x < -2) s.x = canvas.width + 2;
          if (s.x > canvas.width + 2) s.x = -2;
        });
        raf = requestAnimationFrame(draw);
      }

      resize();
      window.addEventListener('resize', resize);
      raf = requestAnimationFrame(draw);

      // Only animate when dark themes active
      const observer = new MutationObserver(() => {
        const isDark = document.body.classList.contains('theme-sacred') || document.body.classList.contains('theme-royal');
        if (!isDark && raf) { cancelAnimationFrame(raf); raf = null; }
        if (isDark && !raf) raf = requestAnimationFrame(draw);
      });
      observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
    })();

    /* ── FLOATING PARTICLES (gold dots for dark themes) ── */
    (function initParticles() {
      const COLORS_DARK = ['rgba(255,215,0,0.7)', 'rgba(232,200,74,0.6)', 'rgba(255,255,200,0.5)', 'rgba(168,240,182,0.5)'];
      const COLORS_LIGHT = ['rgba(200,149,26,0.25)', 'rgba(20,125,73,0.2)', 'rgba(47,128,237,0.18)'];

      function spawnParticle() {
        const isDark = document.body.classList.contains('theme-sacred') || document.body.classList.contains('theme-royal');
        const palette = isDark ? COLORS_DARK : COLORS_LIGHT;
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 5 + 2;
        const dur = Math.random() * 9 + 6;
        const left = Math.random() * 100;
        p.style.cssText = `
          width:${size}px; height:${size}px;
          left:${left}vw; bottom:-10px;
          background:${palette[Math.floor(Math.random() * palette.length)]};
          animation-duration:${dur}s;
          filter: blur(${Math.random() > 0.5 ? 1 : 0}px);
        `;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), dur * 1000);
      }

      setInterval(spawnParticle, 900);
    })();

    /* ── CLICK RIPPLE on cards ── */
    document.getElementById('results').addEventListener('mousedown', (e) => {
      const card = e.target.closest('.day-card');
      if (!card) return;
      const rect = card.getBoundingClientRect();
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      const size = Math.max(rect.width, rect.height) * 1.5;
      ripple.style.cssText = `
        width:${size}px; height:${size}px;
        left:${e.clientX - rect.left - size / 2}px;
        top:${e.clientY - rect.top - size / 2}px;
      `;
      card.style.overflow = 'hidden';
      card.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove(), { once: true });
    });

    /* ── 3D CARD TILT on mouse move ── */
    (function initCardTilt() {
      let current = null;
      document.getElementById('results').addEventListener('mousemove', (e) => {
        const card = e.target.closest('.day-card');
        if (card !== current) {
          if (current) { current.style.removeProperty('--rotX'); current.style.removeProperty('--rotY'); }
          current = card;
        }
        if (!card) return;
        const rect = card.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = (e.clientX - cx) / (rect.width / 2);
        const dy = (e.clientY - cy) / (rect.height / 2);
        card.style.setProperty('--rotX', `${-dy * 4}deg`);
        card.style.setProperty('--rotY', `${dx * 6}deg`);
      });
      document.getElementById('results').addEventListener('mouseleave', () => {
        if (current) { current.style.removeProperty('--rotX'); current.style.removeProperty('--rotY'); current = null; }
      });
    })();

    /* ── SPARKLES on good-card hover ── */
    (function initSparkles() {
      const EMOJIS = ['✨', '⭐', '🌟', '💫', '🍀'];
      let hoverTimeout = null;

      document.getElementById('results').addEventListener('mouseenter', (e) => {
        const card = e.target.closest('.day-card.good');
        if (!card) return;
        clearTimeout(hoverTimeout);
        let count = 0;
        function pop() {
          if (count >= 3) return;
          count++;
          const sp = document.createElement('span');
          sp.className = 'sparkle';
          sp.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
          sp.style.cssText = `left:${10 + Math.random() * 80}%; top:${10 + Math.random() * 60}%;`;
          card.appendChild(sp);
          sp.addEventListener('animationend', () => sp.remove(), { once: true });
          hoverTimeout = setTimeout(pop, 180);
        }
        pop();
      }, true);
    })();

    /* ── SCROLL REVEAL for cards ── */
    (function initScrollReveal() {
      const io = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.remove('reveal-hidden');
            entry.target.classList.add('reveal-visible');
            io.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });

      // Re-observe whenever cards are re-rendered
      const resultsEl = document.getElementById('results');
      new MutationObserver(() => {
        resultsEl.querySelectorAll('.day-card').forEach((card) => {
          if (!card.classList.contains('reveal-visible')) io.observe(card);
        });
      }).observe(resultsEl, { childList: true });
    })();

    /* ── TODAY CARD PULSE DOT ── */
    (function markTodayCard() {
      const todayKey = (() => {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${dd}`;
      })();

      new MutationObserver(() => {
        document.querySelectorAll('.day-card').forEach((card) => {
          card.classList.toggle('today-card', card.dataset.key === todayKey);
        });
      }).observe(document.getElementById('results'), { childList: true });
    })();

    /* ── PILL NUMBER POP ANIMATION ── */
    (function initPillPop() {
      const strip = document.getElementById('summaryStrip');
      new MutationObserver(() => {
        strip.querySelectorAll('strong').forEach((el) => {
          el.classList.remove('pop');
          requestAnimationFrame(() => el.classList.add('pop'));
        });
      }).observe(strip, { childList: true, subtree: true });
    })();

    // ── SCROLL TO TOP ──
    const scrollTopBtn = document.getElementById('scrollTopBtn');
    if (scrollTopBtn) {
      window.addEventListener('scroll', () => {
        scrollTopBtn.classList.toggle('visible', window.scrollY > 300);
      }, { passive: true });
      scrollTopBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }
  </script>
</body>
