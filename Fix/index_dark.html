<!doctype html>
<html lang="th">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ดวงปีนักษัตร สงกรานต์ (Dark Edition)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=K2D:wght@400;600;700;800&family=Srisakdi:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'K2D', sans-serif;
      min-height: 100vh
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 6px 40px
    }

    .main-title {
      font-family: 'Srisakdi', cursive;
      font-size: clamp(32px, 8vw, 56px);
      font-weight: 700;
      text-align: center;
      margin: 6px 0 4px;
      /* Vibrant Gold Gradient */
      background: linear-gradient(to bottom, #fff7ad 0%, #ffd700 50%, #ffa500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.5));
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0 10px
    }

    .controls button {
      width: 44px;
      height: 44px;
      border: 2px solid #d4af37;
      border-radius: 50%;
      background: rgba(212, 175, 55, 0.1);
      color: #d4af37;
      font-size: 24px;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.2s;
    }

    .controls button:active {
      background: #d4af37;
      color: #000;
    }

    .controls input {
      width: 120px;
      height: 44px;
      border: 2px solid #333;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      font-family: inherit;
      outline: none
    }

    .canvas-wrap {
      position: relative;
      width: min(96vw, 620px);
      aspect-ratio: 1
    }

    .canvas-wrap canvas {
      width: 100%;
      height: 100%
    }

    .bottom-text {
      font-family: 'Srisakdi', cursive;
      font-size: clamp(32px, 9vw, 58px);
      font-weight: 700;
      text-align: center;
      margin: 24px 0 16px;
      /* Vibrant Gold Gradient */
      background: linear-gradient(to bottom, #fff7ad 0%, #ffd700 50%, #ffa500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.6));
    }

    .result-card {
      background: #1a1a1a;
      border: 2px solid #d4af37;
      border-radius: 12px;
      padding: 18px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      margin: 8px 0;
      display: none
    }

    .credit {
      font-family: 'Srisakdi', cursive;
      font-size: 18px;
      color: #e0e0e0;
      opacity: 0.6;
      margin-top: 20px;
      text-align: center;
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none
    }

    input[type=number] {
      -moz-appearance: textfield
    }
  </style>
</head>

<body>
  <h1 id="mainTitle" class="main-title">13 เมษา 2569 ปีมะเมีย</h1>
  <div class="controls">
    <button id="prevYear" type="button">−</button>
    <input id="yearInput" type="number" inputmode="numeric" min="2400" max="2800" value="2569">
    <button id="nextYear" type="button">+</button>
  </div>
  <div class="canvas-wrap">
    <canvas id="wheelCanvas" width="1400" height="1400"></canvas>
  </div>
  <div class="bottom-text">นับจากปีสงกรานต์ไปหาปีเกิด</div>
  <div class="credit">Developed with ❤️ by คนโบราณ</div>

  <script>
    const Z = [
      { thai: "ชวด", animal: "หนู", en: "Rat", img: "assets/zodiac_rat.png" },
      { thai: "ฉลู", animal: "วัว", en: "Ox", img: "assets/zodiac_ox.png" },
      { thai: "ขาล", animal: "เสือ", en: "Tiger", img: "assets/zodiac_tiger.png" },
      { thai: "เถาะ", animal: "กระต่าย", en: "Rabbit", img: "assets/zodiac_rabbit.png" },
      { thai: "มะโรง", animal: "มังกร", en: "Dragon", img: "assets/zodiac_dragon.png" },
      { thai: "มะเส็ง", animal: "งู", en: "Snake", img: "assets/zodiac_snake.png" },
      { thai: "มะเมีย", animal: "ม้า", en: "Horse", img: "assets/zodiac_horse.png" },
      { thai: "มะแม", animal: "แพะ", en: "Sheep", img: "assets/zodiac_goat.png" },
      { thai: "วอก", animal: "ลิง", en: "Monkey", img: "assets/zodiac_monkey.png" },
      { thai: "ระกา", animal: "ไก่", en: "Rooster", img: "assets/zodiac_rooster.png" },
      { thai: "จอ", animal: "สุนัข", en: "Dog", img: "assets/zodiac_dog.png" },
      { thai: "กุน", animal: "หมู", en: "Pig", img: "assets/zodiac_pig.png" }
    ];
    const loadedImgs = {};
    let imgsLoaded = 0;
    Z.forEach(z => {
      const img = new Image();
      img.src = z.img;
      img.onload = () => {
        imgsLoaded++;
        if (imgsLoaded === 12) render();
      };
      loadedImgs[z.en] = img;
    });
    const TK = [
      { name: "ตนุ", bad: false },
      { name: "กดุมภะ", bad: false },
      { name: "สหัชชะ", bad: false },
      { name: "พันธุ", bad: false },
      { name: "ปุตตะ", bad: false },
      { name: "อริ", bad: true },
      { name: "ปัตนิ", bad: false },
      { name: "มรณะ", bad: true },
      { name: "ศุภะ", bad: false },
      { name: "กัมมะ", bad: false },
      { name: "ลาภะ", bad: false },
      { name: "วินาสน์", bad: true }
    ];
    const BY = 2569, BI = 6;
    function mod(v, n) { return ((v % n) + n) % n }
    function y2i(y) { return mod(Number(y) - BY + BI, 12) }
    function toR(d) { return d * Math.PI / 180 }
    function ang(i) { return -90 - i * 30 } // degrees, counter-clockwise zodiac

    const cv = document.getElementById('wheelCanvas');
    const c = cv.getContext('2d');
    const W = cv.width, CX = W / 2, CY = W / 2;
    const FONT = "'K2D', sans-serif";

    function draw(ai) {
      c.clearRect(0, 0, W, W);

      // Radii
      const RO = 460;   // outer ring outer edge
      const RI = 448;   // outer ring inner edge
      const RS = 440;   // segment outer
      const RN = 260;   // segment inner (red ring)
      const RC = 85;    // center circle
      const RL = 560;   // label radius for ทักษา

      // === OUTER SILVER RING ===
      c.beginPath(); c.arc(CX, CY, RO, 0, Math.PI * 2);
      c.fillStyle = '#e0e0e0'; c.fill(); // Silver Metallic
      c.beginPath(); c.arc(CX, CY, RI, 0, Math.PI * 2);
      c.fillStyle = '#121212'; c.fill(); // Dark Background

      // === SEGMENTS ===
      for (let i = 0; i < 12; i++) {
        const a1 = toR(ang(i) + 15), a2 = toR(ang(i) - 15);
        c.beginPath();
        c.moveTo(CX + RC * Math.cos(a1), CY + RC * Math.sin(a1));
        c.lineTo(CX + RS * Math.cos(a1), CY + RS * Math.sin(a1));
        c.lineWidth = 2; c.strokeStyle = '#c4a35a'; c.stroke();
      }

      // === RED INNER RING (VIVID) ===
      c.beginPath(); c.arc(CX, CY, RN, 0, Math.PI * 2);
      c.lineWidth = 6; c.strokeStyle = '#ff3131'; c.stroke();

      // === ANIMALS + TEXT ===
      for (let i = 0; i < 12; i++) {
        const a = toR(ang(i));
        const z = Z[i];

        // Luxurious image
        const er = (RS + RN) / 2 + 18;
        const img = loadedImgs[z.en];
        if (img && img.complete) {
          const iw = 155;
          c.save();
          // Natural boost for dark background
          c.filter = 'saturate(1.4) contrast(1.05) brightness(1.05)';
          // Lighter shadow for dark background
          c.shadowColor = 'rgba(255,255,255,0.15)';
          c.shadowBlur = 15;
          
          c.drawImage(img, CX + er * Math.cos(a) - iw / 2, CY + er * Math.sin(a) - iw / 2, iw, iw);
          c.restore();
        }

        // Thai zodiac name
        c.save();
        c.translate(CX, CY);
        let rot = a + Math.PI / 2;
        rot = (rot % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);

        c.font = `bold 28px ${FONT}`;
        c.fillStyle = '#d4af37'; // Gold text
        c.textAlign = 'center';

        if (rot > Math.PI / 2 && rot < Math.PI * 1.5) {
          c.rotate(rot + Math.PI);
          c.textBaseline = 'bottom';
          c.fillText(z.thai, 0, RN - 8);
        } else {
          c.rotate(rot);
          c.textBaseline = 'top';
          c.fillText(z.thai, 0, -RN + 8);
        }
        c.restore();
      }

      // === CENTER CIRCLE ===
      c.beginPath(); c.arc(CX, CY, RC, 0, Math.PI * 2);
      c.fillStyle = '#1a1a1a'; c.fill();
      c.lineWidth = 5; c.strokeStyle = '#d4af37'; c.stroke();

      // === OUTER ทักษา LABELS ===
      for (let i = 0; i < 12; i++) {
        const ti = mod(i - ai, 12);
        const tk = TK[ti];
        const a = toR(ang(i));
        const lx = CX + RL * Math.cos(a);
        const ly = CY + RL * Math.sin(a);

        if (ti === 0) {
          c.font = `900 48px ${FONT}`;
          c.fillStyle = '#d4af37';
          c.textAlign = 'center'; c.textBaseline = 'middle';
          c.fillText('ตนุ', lx, ly);

          const r_lor = RL + 65;
          const a_lor = a + 0.08;
          const lx_lor = CX + r_lor * Math.cos(a_lor);
          const ly_lor = CY + r_lor * Math.sin(a_lor);

          c.font = `900 100px ${FONT}`;
          c.fillStyle = '#ff4d4d'; // Brighter red for dark mode
          c.fillText('ล', lx_lor, ly_lor);
        } else {
          const isBad = tk.bad;
          c.font = isBad ? `900 54px ${FONT}` : `900 48px ${FONT}`;
          c.fillStyle = isBad ? '#ff4d4d' : '#fff';
          c.textAlign = 'center'; c.textBaseline = 'middle';
          c.fillText(tk.name, lx, ly);
        }
      }
    }

    function render() {
      const y = Number(document.getElementById('yearInput').value) || BY;
      const ai = y2i(y);
      document.getElementById('mainTitle').textContent = `13 เมษา ${y} ปี${Z[ai].thai}`;
      draw(ai);
    }

    document.getElementById('prevYear').onclick = () => {
      const i = document.getElementById('yearInput');
      i.value = (Number(i.value) || BY) - 1; render();
    };
    document.getElementById('nextYear').onclick = () => {
      const i = document.getElementById('yearInput');
      i.value = (Number(i.value) || BY) + 1; render();
    };
    document.getElementById('yearInput').addEventListener('input', render);
  </script>
</body>

</html>
