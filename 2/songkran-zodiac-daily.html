<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ปีนักษัตรสงกรานต์รายวัน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=K2D:wght@400;600;700;800&family=Srisakdi:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-2: #f6f3ea;
      --text: #1a1a1a;
      --muted: #656565;
      --title: #1a1a1a;
      --accent: #c8951a;
      --accent-2: #0c6f52;
      --danger: #b3261e;
      --good: #147d49;
      --card-border: #c8951a;
      --ctrl-bg: #f5f5f5;
      --ctrl-text: #111111;
      --ctrl-border: #333333;
      --focus: #2f80ed;
      --shadow: rgba(0, 0, 0, 0.16);
      --good-bg: #e8f7ef;
      --danger-bg: #fff0ee;
      --neutral-bg: #f6f1e7;
      --title-shadow: transparent;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body.theme-sacred {
      --bg: #03010a;
      --surface: #100923;
      --surface-2: #1b1038;
      --text: #f0e6c8;
      --muted: #bba979;
      --title: #e8c84a;
      --accent: #e8c84a;
      --accent-2: #72d89a;
      --danger: #ff9a92;
      --good: #72d89a;
      --card-border: #e8c84a;
      --ctrl-bg: #1e1044;
      --ctrl-text: #e8c84a;
      --ctrl-border: #e8c84a;
      --focus: #7eb6ff;
      --shadow: rgba(0, 0, 0, 0.45);
      --good-bg: #102d1d;
      --danger-bg: #32100f;
      --neutral-bg: #1b1038;
      --title-shadow: rgba(232, 200, 74, 0.45);
    }

    body.theme-royal {
      --bg: #061a10;
      --surface: #092617;
      --surface-2: #103b25;
      --text: #ffd700;
      --muted: #e3c35a;
      --title: #ffd700;
      --accent: #ffd700;
      --accent-2: #a8f0b6;
      --danger: #ffb4ab;
      --good: #a8f0b6;
      --card-border: #ffd700;
      --ctrl-bg: #0e3d25;
      --ctrl-text: #ffd700;
      --ctrl-border: #ffd700;
      --focus: #8fc7ff;
      --shadow: rgba(0, 0, 0, 0.45);
      --good-bg: #13391f;
      --danger-bg: #3f1712;
      --neutral-bg: #103b25;
      --title-shadow: rgba(255, 215, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "K2D", "Noto Sans Thai", Tahoma, system-ui, sans-serif;
      letter-spacing: 0;
      transition: background 0.25s, color 0.25s;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      touch-action: manipulation;
    }

    #starCanvas {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .theme-selector {
      position: fixed;
      top: calc(12px + var(--safe-top));
      right: 12px;
      z-index: 70;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .theme-main-btn {
      width: 48px;
      height: 48px;
      border: 2px solid var(--ctrl-border);
      border-radius: 50%;
      background: var(--ctrl-bg);
      color: var(--ctrl-text);
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 4px 15px var(--shadow);
      cursor: pointer;
    }

    .theme-options {
      display: none;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 30px;
      background: rgba(0, 0, 0, 0.76);
      box-shadow: 0 8px 28px var(--shadow);
      backdrop-filter: blur(12px);
    }

    .theme-selector.open .theme-options {
      display: flex;
    }

    .theme-btn {
      width: 40px;
      height: 40px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
    }

    .btn-sacred {
      background: linear-gradient(135deg, #03010a, #1e1044);
    }

    .btn-solar {
      background: #ffffff;
    }

    .btn-royal {
      background: linear-gradient(135deg, #061a10, #ffd700);
    }

    .theme-btn.active {
      outline: 3px solid rgba(47, 128, 237, 0.42);
      border-color: var(--focus);
    }

    .app-shell {
      width: min(100%, 1000px);
      margin: 0 auto;
      padding: calc(14px + var(--safe-top)) clamp(10px, 2.4vw, 20px) calc(86px + var(--safe-bottom));
    }

    .page-head {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto 14px;
      padding: 10px 0 2px;
      text-align: center;
    }
    .tool-nav {
      width: min(100%, 620px);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin: 68px auto 8px;
      padding: 5px;
      border: 2px solid var(--ctrl-border);
      border-radius: 8px;
      background: var(--ctrl-bg);
    }

    .tool-nav a {
      min-width: 0;
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px 6px;
      border-radius: 6px;
      color: var(--ctrl-text);
      font-size: clamp(14px, 3.8vw, 17px);
      font-weight: 800;
      text-align: center;
      text-decoration: none;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .tool-nav a.active {
      background: var(--card-border);
      color: var(--bg);
    }
    .page-head h1 {
      margin: 0;
      color: var(--title);
      font-family: "Srisakdi", cursive;
      font-size: clamp(28px, 7.5vw, 54px);
      font-weight: 700;
      line-height: 1.35;
      padding: 0.04em 0 0.16em;
      text-shadow: 0 0 10px var(--title-shadow);
    }

    body.theme-sacred .page-head h1 {
      background: linear-gradient(135deg, #e8c84a 0%, #fff5c0 45%, #c8951a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 18px rgba(232, 200, 74, 0.55));
    }

    body.theme-royal .page-head h1 {
      background: linear-gradient(135deg, #ffd700 0%, #fffde0 45%, #b8860b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 18px rgba(255, 215, 0, 0.55));
    }

    .subtitle {
      max-width: 760px;
      margin: 6px auto 0;
      color: var(--muted);
      font-size: clamp(17px, 4.5vw, 22px);
      font-weight: 700;
      line-height: 1.5;
    }

    .control-panel,
    .today-board,
    .info-panel {
      border: 2px solid var(--card-border);
      border-radius: 8px;
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      box-shadow: 0 12px 30px var(--shadow);
    }

    .control-panel {
      position: sticky;
      top: calc(8px + var(--safe-top));
      z-index: 12;
      max-width: 620px;
      margin: 0 auto;
      padding: 10px;
      backdrop-filter: blur(14px);
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 10px;
    }

    .segmented button,
    .filter-row button,
    .action-row button {
      min-height: 42px;
      border: 2px solid var(--ctrl-border);
      border-radius: 8px;
      background: var(--ctrl-bg);
      color: var(--ctrl-text);
      font-weight: 900;
      cursor: pointer;
    }

    .segmented button.active,
    .filter-row button.active {
      background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 62%, #ffffff));
      color: #16130d;
      box-shadow: 0 0 16px color-mix(in srgb, var(--accent) 34%, transparent);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field label,
    .month-filter label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .field input,
    .field select,
    .month-filter select {
      width: 100%;
      min-height: 46px;
      padding: 8px 12px;
      border: 2px solid var(--ctrl-border);
      border-radius: 8px;
      background: var(--ctrl-bg);
      color: var(--ctrl-text);
      font-weight: 900;
    }

    .year-stepper {
      display: grid;
      grid-template-columns: 46px 1fr 46px;
      gap: 6px;
    }

    .year-stepper button {
      min-height: 46px;
      border: 2px solid var(--ctrl-border);
      border-radius: 8px;
      background: var(--ctrl-bg);
      color: var(--ctrl-text);
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
    }

    .action-row,
    .filter-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .action-row {
      grid-template-columns: 1.2fr 1fr;
    }

    #todayBtn {
      background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 52%, #ffffff));
      color: #16130d;
      box-shadow: 0 10px 22px color-mix(in srgb, var(--accent) 28%, transparent);
    }

    .month-filter {
      display: none;
      margin-top: 10px;
    }

    body[data-view="month"] .month-filter {
      display: block;
    }

    .summary-strip {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      max-width: 620px;
      margin: 16px auto 12px;
      padding: 14px 20px;
      border: 2px solid var(--card-border);
      border-radius: 12px;
      background: color-mix(in srgb, var(--surface) 96%, var(--surface-2));
      box-shadow: 0 10px 24px color-mix(in srgb, var(--shadow) 50%, transparent);
      transition: all 0.25s ease;
    }

    .summary-row {
      display: flex !important;
      flex-flow: row nowrap !important;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
    }

    .summary-row.row-1 {
      border-bottom: 1.5px dashed color-mix(in srgb, var(--ctrl-border) 25%, transparent);
      padding-bottom: 8px;
    }

    .summary-row.row-2 {
      gap: 20px;
      padding-top: 2px;
    }

    .summary-item {
      display: inline-flex !important;
      flex-flow: row nowrap !important;
      align-items: center;
      gap: 6px;
      min-width: 0;
      white-space: nowrap !important;
    }

    .summary-label {
      display: inline-block !important;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.3px;
      margin: 0 !important;
    }

    .summary-value {
      display: inline-block !important;
      font-size: 15px;
      font-weight: 900;
      color: var(--text);
      line-height: 1.2;
      margin: 0 !important;
    }

    .summary-value.highlight-main {
      color: var(--accent);
      font-size: 17px;
      font-weight: 900;
      text-shadow: 0 0 8px color-mix(in srgb, var(--accent) 25%, transparent);
    }

    .summary-value.highlight-clash {
      color: var(--danger);
      font-size: 17px;
      font-weight: 900;
      text-shadow: 0 0 8px color-mix(in srgb, var(--danger) 25%, transparent);
    }

    .summary-divider {
      color: var(--accent);
      font-weight: 900;
      font-size: 16px;
      display: inline-block !important;
    }

    .today-board {
      display: none;
      max-width: 620px;
      margin: 12px auto;
      overflow: hidden;
    }

    body[data-view="today"] .today-board {
      display: block;
    }

    .today-hero {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 12px;
      padding: 14px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 16%, transparent), transparent 65%),
        var(--surface);
    }

    .animal-orb {
      display: grid;
      place-items: center;
      width: 112px;
      aspect-ratio: 1;
      padding: 7px;
      border: 3px solid var(--accent);
      border-radius: 50%;
      background: radial-gradient(circle, var(--surface-2), var(--surface));
      color: var(--accent);
      font-size: 26px;
      font-weight: 900;
      text-align: center;
      overflow: hidden;
      box-shadow: 0 12px 30px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    .animal-img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 8px 12px color-mix(in srgb, var(--shadow) 80%, transparent));
    }

    .animal-card-main {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .animal-icon {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 58px;
      height: 58px;
      padding: 4px;
      border: 2px solid color-mix(in srgb, var(--accent) 72%, var(--ctrl-border));
      border-radius: 50%;
      background: radial-gradient(circle, var(--surface-2), var(--surface));
      overflow: hidden;
    }

    .today-copy h2 {
      margin: 0;
      font-size: 25px;
      line-height: 1.15;
    }

    .today-copy p {
      margin: 8px 0 0;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.55;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      min-height: 30px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--neutral-bg);
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
    }

    .status-pill.main {
      background: var(--good);
      color: #ffffff;
    }

    .status-pill.clash {
      background: var(--danger);
      color: #ffffff;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      max-width: 620px;
      margin: 0 auto;
    }

    body[data-view="info"] .results {
      display: none;
    }

    .day-card,
    .info-card {
      display: grid;
      grid-template-columns: 86px 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 86px;
      padding: 10px;
      border: 2px solid var(--card-border);
      border-left-width: 7px;
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      text-align: left;
      box-shadow: 0 8px 20px var(--shadow);
      cursor: pointer;
    }

    .day-card.main {
      border-color: color-mix(in srgb, var(--good) 56%, var(--card-border));
      border-left-color: var(--good);
      background: linear-gradient(90deg, var(--good-bg), var(--surface) 68%);
    }

    .day-card.clash {
      border-color: color-mix(in srgb, var(--danger) 58%, var(--card-border));
      border-left-color: var(--danger);
      background:
        repeating-linear-gradient(135deg, transparent 0 10px, color-mix(in srgb, var(--danger) 9%, transparent) 10px 18px),
        linear-gradient(90deg, var(--danger-bg), var(--surface) 68%);
    }

    .date-box strong {
      display: block;
      font-size: 20px;
      line-height: 1.1;
    }

    .date-box span,
    .animal-desc {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.25;
    }

    .animal-name {
      display: block;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.2;
    }

    .animal-desc {
      margin-top: 4px;
    }

    .info-panel {
      display: none;
      max-width: 620px;
      margin: 12px auto 0;
      padding: 12px;
    }

    body[data-view="info"] .info-panel {
      display: block;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .info-card {
      grid-template-columns: 78px 1fr;
      cursor: pointer;
    }

    .info-card .animal-orb {
      width: 70px;
      padding: 5px;
    }

    .notice {
      display: none;
      margin: 12px 0;
      padding: 14px;
      border: 2px dashed var(--ctrl-border);
      border-radius: 8px;
      color: var(--muted);
      font-weight: 900;
      text-align: center;
    }

    .credit {
      margin: 20px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      text-align: center;
    }

    .sheet-overlay {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: flex-end;
      padding: 12px;
      background: rgba(0, 0, 0, 0.52);
    }

    .sheet-overlay.open {
      display: flex;
    }

    .sheet {
      width: min(100%, 720px);
      max-height: 86vh;
      margin: 0 auto;
      overflow: auto;
      border: 2px solid var(--card-border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 18px 40px var(--shadow);
      animation: sheetUp 0.2s ease both;
    }

    .sheet-head {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--ctrl-border);
      background: var(--surface);
    }

    .sheet-title {
      margin: 0;
      color: var(--accent);
      font-size: 24px;
      line-height: 1.2;
    }

    .sheet-close {
      width: 40px;
      height: 40px;
      border: 2px solid var(--ctrl-border);
      border-radius: 50%;
      background: var(--ctrl-bg);
      color: var(--ctrl-text);
      font-size: 24px;
      font-weight: 900;
      cursor: pointer;
    }

    .sheet-body {
      padding: 14px;
    }

    .sheet-line {
      margin: 0 0 10px;
      color: var(--muted);
      font-weight: 900;
      line-height: 1.55;
    }

    .sheet-oracle {
      margin: 0 0 12px;
      padding: 10px;
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 12%, var(--surface));
      font-size: 17px;
      font-weight: 900;
      line-height: 1.6;
    }

    .sheet-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .sheet-box {
      padding: 10px;
      border: 1px solid var(--ctrl-border);
      border-radius: 8px;
      background: var(--ctrl-bg);
    }

    .sheet-box strong {
      display: block;
      margin-bottom: 6px;
    }

    .sheet-box ul {
      margin: 0;
      padding-left: 18px;
    }

    .sheet-box li {
      margin: 5px 0;
      font-weight: 800;
      line-height: 1.45;
    }

    .sheet-animal {
      display: grid;
      grid-template-columns: 76px 1fr;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1.5px solid var(--ctrl-border);
      border-radius: 8px;
      background: var(--ctrl-bg);
    }

    .sheet-animal .animal-orb {
      width: 68px;
      padding: 5px;
    }

    .sheet-animal strong,
    .sheet-animal span {
      display: block;
      font-weight: 900;
      line-height: 1.35;
    }

    .sheet-animal span {
      color: var(--muted);
      font-size: 13px;
    }

    .audio-group,
    .share-group {
      position: fixed;
      bottom: calc(30px + var(--safe-bottom));
      z-index: 60;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px;
      border: 1.5px solid #ffd700;
      background: rgba(0, 0, 0, 0.55);
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.22);
      backdrop-filter: blur(12px);
      transition: transform 0.42s ease, background 0.2s ease;
    }

    .audio-group {
      left: 0;
      border-left: none;
      border-radius: 0 45px 45px 0;
      transform: translateX(calc(-100% + 8px));
    }

    .share-group {
      right: 0;
      border-right: none;
      border-radius: 45px 0 0 45px;
      transform: translateX(calc(100% - 8px));
    }

    .audio-group.active,
    .share-group.active {
      transform: translateX(0);
      background: rgba(0, 0, 0, 0.86);
    }

    .music-btn,
    .vol-toggle-btn,
    .share-btn {
      display: grid;
      place-items: center;
      width: 50px;
      height: 50px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffd700, #b8860b);
      color: #000000;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }

    .vol-container {
      position: fixed;
      left: 96px;
      bottom: calc(35px + var(--safe-bottom));
      z-index: 61;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border: 1.5px solid #ffd700;
      border-radius: 40px;
      background: rgba(0, 0, 0, 0.9);
      color: #ffd700;
      opacity: 0;
      pointer-events: none;

    function mod(value, size) {
      return ((Number(value) % size) + size) % size;
    }

    function teacherHref(href) {
      const [beforeHash, hash = ''] = href.split('#');
      const [path, query = ''] = beforeHash.split('?');
      const params = new URLSearchParams(query);
      params.set('teacher', '1');
      return `${path}?${params.toString()}${hash ? `#${hash}` : ''}`;
    }

    function applyTeacherMode() {

      if (params.get('teacher') === '1') {
        localStorage.setItem(TEACHER_MODE_KEY, '1');
      } else if (params.get('teacher') === '0') {
        localStorage.removeItem(TEACHER_MODE_KEY);
      }

      const enabled = localStorage.getItem(TEACHER_MODE_KEY) === '1';
      document.documentElement.classList.toggle('teacher-mode', enabled);
      if (!enabled) return;

      document.querySelectorAll('.tool-nav a').forEach((link) => {
        const href = link.getAttribute('href');
        if (href) link.setAttribute('href', teacherHref(href));
      });
    }

    function currentSongkranBEYear(date) {
      const be = date.getFullYear() + 543;
      const start = new Date(date.getFullYear(), SONGKRAN_START_MONTH, SONGKRAN_START_DAY);
      return date >= start ? be : be - 1;
    }

    function adYear(beYear) {
      return Number(beYear) - 543;
    }

    function songkranStart(beYear) {
      return new Date(adYear(beYear), SONGKRAN_START_MONTH, SONGKRAN_START_DAY);
    }

    function songkranEnd(beYear) {
      return new Date(adYear(beYear + 1), SONGKRAN_START_MONTH, SONGKRAN_START_DAY - 1);
    }

    function daysBetween(a, b) {
      const start = new Date(a.getFullYear(), a.getMonth(), a.getDate());
      const end = new Date(b.getFullYear(), b.getMonth(), b.getDate());
      return Math.round((end - start) / 86400000);
    }

    function dateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function monthKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
    }

    function formatDate(date, includeYear = false) {
      const base = `${date.getDate()} ${MONTHS[date.getMonth()].short}`;
      return includeYear ? `${base} ${date.getFullYear() + 543}` : base;
    }

    function formatMonthKey(key) {
      const [year, month] = key.split('-').map(Number);
      return `${MONTHS[month - 1].full} ${year + 543}`;
    }

    function zodiacIndexForBEYear(beYear) {
      return mod(Number(beYear) - 2563, 12);
    }

    function clashIndex(index) {
      return mod(index + 6, 12);
    }

    function chataForZodiacIndex(index) {
      return CHATA_SIGNS[mod(index - 6, CHATA_SIGNS.length)];
    }

    function statusFor(index, annualIndex) {
      if (index === annualIndex) return 'main';
      if (index === clashIndex(annualIndex)) return 'clash';
      return 'neutral';
    }

    function statusLabel(status) {
      if (status === 'main') return 'ปีหลัก';
      if (status === 'clash') return 'ปะทะ';
      return 'กลาง';
    }

    function buildItems() {
      const start = songkranStart(state.yearBE);
      const end = songkranEnd(state.yearBE);
      const annualIndex = zodiacIndexForBEYear(state.yearBE);
      const total = daysBetween(start, end) + 1;
      items = Array.from({ length: total }, (_, offset) => {
        const date = new Date(start.getFullYear(), start.getMonth(), start.getDate() + offset);
        const index = mod(annualIndex + offset, 12);
        const animal = ZODIACS[index];
        const chata = chataForZodiacIndex(index);
        const status = statusFor(index, annualIndex);
        return {
          key: dateKey(date),
          date,
          offset,
          index,
          animal,
          chata,
          status,
          monthKey: monthKey(date)
        };
      });
    }

    function monthOptions() {
      const seen = new Map();
      items.forEach((item) => {
        if (!seen.has(item.monthKey)) seen.set(item.monthKey, item.date);
      });
      return Array.from(seen.keys());
    }

    function todayItem() {
      const key = dateKey(new Date());
      return items.find((item) => item.key === key) || items[0];
    }

    function visibleItems() {
      let list = state.view === 'today' ? [todayItem()] : items.slice();
      if (state.view === 'month') {
        list = list.filter((item) => item.monthKey === state.monthKey);
      }
      if (state.filter !== 'all') {
        list = list.filter((item) => item.status === state.filter);
      }
      if (state.focusAnimal !== 'all') {
        list = list.filter((item) => item.index === Number(state.focusAnimal));
      }
      return list;
    }

      state.view = normalizeView(saved.view || 'year');

      state.focusAnimal = saved.focusAnimal || 'all';
      state.monthKey = saved.monthKey || '';
      state.displayMode = saved.displayMode || 'table';

      let theme = saved.theme || localStorage.getItem(THEME_KEY) || 'royal';
      if (!localStorage.getItem('themeMigratedToRoyalV3')) {
        theme = 'royal';
        localStorage.setItem('themeMigratedToRoyalV3', 'true');

    function cssVar(name, fallback) {
      const value = getComputedStyle(document.body).getPropertyValue(name).trim();
      return value || fallback;
    }

    function roundRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + w, y, x + w, y + h, radius);
      ctx.arcTo(x + w, y + h, x, y + h, radius);
      ctx.arcTo(x, y + h, x, y, radius);
      ctx.arcTo(x, y, x + w, y, radius);
      ctx.closePath();
    }

    function drawFittedText(ctx, text, x, y, maxWidth, baseSize, minSize = 16) {
      let size = baseSize;
      ctx.font = `800 ${size}px K2D, Tahoma`;
      while (ctx.measureText(text).width > maxWidth && size > minSize) {
        size -= 1;
        ctx.font = `800 ${size}px K2D, Tahoma`;
      }
      ctx.fillText(text, x, y);
    }

    function drawZodiacImage(ctx, animal, x, y, size) {
      const img = zodiacImageCache.get(animal.image);
      ctx.save();
      ctx.beginPath();
      ctx.arc(x + size / 2, y + size / 2, size / 2, 0, Math.PI * 2);
      ctx.closePath();
      ctx.fillStyle = cssVar('--surface-2', '#f9f0d2');
      ctx.fill();
      ctx.clip();
      if (img && img.complete && img.naturalWidth) {
        ctx.drawImage(img, x + size * 0.05, y + size * 0.05, size * 0.9, size * 0.9);
      } else {
        ctx.fillStyle = cssVar('--accent', '#d7a327');
        ctx.font = `800 ${Math.max(18, size * 0.28)}px K2D, Tahoma`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(animal.name, x + size / 2, y + size / 2);
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
      }
      ctx.restore();
      ctx.lineWidth = Math.max(3, size * 0.045);
      ctx.strokeStyle = cssVar('--accent', '#d7a327');
      ctx.beginPath();
      ctx.arc(x + size / 2, y + size / 2, size / 2 - ctx.lineWidth / 2, 0, Math.PI * 2);
      ctx.stroke();
    }

    async function createExportCanvas() {
      await zodiacImagesReady;
      if (document.fonts?.ready) await document.fonts.ready;
      const list = visibleItems();
      const info = annualInfo();
      const width = 1200;
      const cols = 2;
      const gap = 18;
      const margin = 44;
      const cardH = 104;
      const rows = Math.max(1, Math.ceil(list.length / cols));
      const height = 310 + rows * (cardH + gap) + 90;
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      const bg = cssVar('--bg', '#f6f3ea');
      const surface = cssVar('--surface', '#fffdf6');
      const text = cssVar('--text', '#1c1a15');
      const muted = cssVar('--muted', '#6f6656');
      const accent = cssVar('--accent', '#d7a327');
      const good = cssVar('--good', '#147d49');
      const danger = cssVar('--danger', '#b3261e');

      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = accent;
      ctx.font = '700 62px Srisakdi, K2D, Tahoma';
      ctx.fillText(`13 เมษา ${state.yearBE} ปี${info.annual.name}`, margin, 88);
      ctx.fillStyle = text;
      ctx.font = '800 34px K2D, Tahoma';
      ctx.fillText(`รอบ ${formatDate(info.start, true)} - ${formatDate(info.end, true)}`, margin, 132);
      ctx.fillText(`ปี${info.annual.name} ปะทะปี${info.clash.name}`, margin, 178);
      drawZodiacImage(ctx, info.annual, width - 226, 58, 76);
      drawZodiacImage(ctx, info.clash, width - 128, 58, 76);
      ctx.fillStyle = muted;
      ctx.font = '700 24px K2D, Tahoma';
      ctx.fillText(`มุมมอง: ${state.view === 'today' ? 'วันนี้' : state.view === 'month' ? formatMonthKey(state.monthKey) : 'ครบปี'} | ตัวกรอง: ${state.filter === 'all' ? 'ทั้งหมด' : statusLabel(state.filter)}`, margin, 220);

      const cardW = (width - margin * 2 - gap) / cols;
      list.forEach((item, i) => {
        const row = Math.floor(i / cols);
        const col = i % cols;
        const x = margin + col * (cardW + gap);
        const y = 260 + row * (cardH + gap);
        ctx.fillStyle = surface;
        roundRect(ctx, x, y, cardW, cardH, 12);
        ctx.fill();
        ctx.lineWidth = 5;
        ctx.strokeStyle = item.status === 'clash' ? danger : item.status === 'main' ? good : text;
        ctx.stroke();
        drawZodiacImage(ctx, item.animal, x + 18, y + 18, 68);
        ctx.fillStyle = item.status === 'clash' ? danger : item.status === 'main' ? good : text;
        ctx.font = '800 27px K2D, Tahoma';
        ctx.fillText(formatDate(item.date, true), x + 100, y + 38);
        ctx.fillStyle = text;
        drawFittedText(ctx, item.animal.name, x + 100, y + 76, cardW - 230, 32, 20);
        ctx.fillStyle = item.status === 'clash' ? danger : item.status === 'main' ? good : muted;
        ctx.font = '800 22px K2D, Tahoma';
        ctx.fillText(statusLabel(item.status), x + cardW - 96, y + 63);
      });

      ctx.fillStyle = muted;
      ctx.font = '700 22px K2D, Tahoma';
      ctx.textAlign = 'center';
      ctx.fillText('Developed with ❤️ by คนโบราณ', width / 2, height - 42);
      ctx.textAlign = 'left';
      return canvas;
    }

    function canvasToBlob(canvas) {
      return new Promise((resolve) => canvas.toBlob(resolve, 'image/png', 0.95));
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function exportFileName() {
      const viewPart = state.view === 'month' ? state.monthKey : state.view;
      return `songkran-zodiac-daily-${state.yearBE}-${viewPart}.png`;
    }

    function normalizeMusicIndex(index) {
      return mod(Number(index) || 0, MUSIC_PLAYLIST.length);
    }

    function getStoredMusicIndex() {
      return normalizeMusicIndex(localStorage.getItem('zodiacMusicTrackIndex'));
    }

    function restoredMusicTime() {
      const saved = Number(localStorage.getItem('zodiacMusicTime')) || 0;
      const wasPlaying = localStorage.getItem('zodiacMusicPlaying') === 'true';
      const savedAt = Number(localStorage.getItem('zodiacMusicLastSavedAt')) || 0;
      if (!wasPlaying || !savedAt) return saved;
      return saved + Math.max(0, (Date.now() - savedAt) / 1000);
    }

    function setMusicTrack(index, startTime = 0) {
      const music = $('bgMusic');
      const safeIndex = normalizeMusicIndex(index);
      const track = MUSIC_PLAYLIST[safeIndex];
      if (!music.src || music.src !== track.url) {
        music.src = track.url;
        music.load();
      }
      music.dataset.trackIndex = String(safeIndex);
      music.dataset.trackTitle = track.title;
      localStorage.setItem('zodiacMusicTrackIndex', String(safeIndex));
      const time = Number(startTime) || 0;
      if (time > 0) {
        const applyTime = () => {
          try {
            const maxTime = Number.isFinite(music.duration) ? Math.max(0, music.duration - 0.5) : time;
            music.currentTime = Math.min(time, maxTime);
          } catch (error) {
            console.warn('Could not restore music time', error);
          }
        };
        if (music.readyState >= 1) applyTime();
        else music.addEventListener('loadedmetadata', applyTime, { once: true });
      }
      return track;
    }

    function saveMusicState() {
      const music = $('bgMusic');
      if (Number.isFinite(music.currentTime)) {
        localStorage.setItem('zodiacMusicTime', String(music.currentTime));
      }
      localStorage.setItem('zodiacMusicTrackIndex', music.dataset.trackIndex || '0');
      localStorage.setItem('zodiacMusicPlaying', music.paused ? 'false' : 'true');
      localStorage.setItem('zodiacMusicLastSavedAt', String(Date.now()));
    }

    function updateMusicButton(playing) {
      $('toggleMusic').textContent = playing ? '🔊' : '🎵';
      $('toggleMusic').style.background = playing ? '#00ff00' : 'linear-gradient(135deg, #ffd700, #b8860b)';
    }

    function playCurrentMusic() {
      const music = $('bgMusic');
      musicPlaying = true;
      return music.play().then(() => {
        updateMusicButton(true);
        localStorage.setItem('zodiacMusicPlaying', 'true');
        localStorage.setItem('zodiacMusicLastSavedAt', String(Date.now()));
      }).catch((error) => {
        musicPlaying = false;
        updateMusicButton(false);
        showShareNotice('แตะปุ่มเพลงเพื่อเล่นต่อ');
        console.warn('Audio play blocked', error);
      });
    }

    function playNextMusicTrack() {
      const music = $('bgMusic');
      const current = Number(music.dataset.trackIndex || getStoredMusicIndex());
      setMusicTrack(current + 1, 0);
      localStorage.setItem('zodiacMusicTime', '0');
      localStorage.setItem('zodiacMusicLastSavedAt', String(Date.now()));
      playCurrentMusic();
    }

    function toggleMusic() {
      const music = $('bgMusic');
      activateAudioGroup();
      if (music.paused) {
        playCurrentMusic();
      } else {
        music.pause();
        musicPlaying = false;
        updateMusicButton(false);
        saveMusicState();
      }
    }

    function initMusic() {
      const savedVol = localStorage.getItem('zodiacMusicVolume');
      const volume = savedVol === null ? 0.75 : Number(savedVol);
      $('bgMusic').volume = Number.isFinite(volume) ? volume : 0.75;
      $('volumeRange').value = String($('bgMusic').volume);
      setMusicTrack(getStoredMusicIndex(), restoredMusicTime());
      updateMusicButton(false);
      if (localStorage.getItem('zodiacMusicPlaying') === 'true') {
        playCurrentMusic();
      }
    }

    function currentTheme() {
      if (document.body.classList.contains('theme-sacred')) return 'sacred';
      if (document.body.classList.contains('theme-royal')) return 'royal';
      return 'solar';
    }

    function setTheme(theme, persist = true) {
      document.body.classList.remove('theme-sacred', 'theme-royal');
      if (theme !== 'solar') document.body.classList.add(`theme-${theme}`);
      document.querySelectorAll('[data-theme]').forEach((button) => button.classList.toggle('active', button.dataset.theme === theme));
      $('themeSelector').classList.remove('open');
      if (persist) {
        localStorage.setItem(THEME_KEY, theme);
        saveSettings();
      }
    }

    function bindEvents() {
      $('themeSelector').querySelector('.theme-main-btn').addEventListener('click', (event) => {
        event.stopPropagation();
        $('themeSelector').classList.toggle('open');
      });
      document.querySelectorAll('[data-theme]').forEach((button) => {
        button.addEventListener('click', () => setTheme(button.dataset.theme));
      });
      document.addEventListener('click', (event) => {
        if (!$('themeSelector').contains(event.target)) $('themeSelector').classList.remove('open');
      });

      document.querySelectorAll('.segmented [data-view]').forEach((button) => button.addEventListener('click', () => setView(button.dataset.view)));
      document.querySelectorAll('[data-filter]').forEach((button) => button.addEventListener('click', () => setFilter(button.dataset.filter)));
      $('prevYear').addEventListener('click', () => {
        state.yearBE -= 1;
        $('targetYear').value = String(state.yearBE);
        render();
      });
      $('nextYear').addEventListener('click', () => {
        state.yearBE += 1;
        $('targetYear').value = String(state.yearBE);
        render();
      });
      $('targetYear').addEventListener('input', () => {
        const value = Number($('targetYear').value);
        if (Number.isFinite(value) && value >= 2400 && value <= 2800) {
          state.yearBE = value;
          render();
        }
      });
      $('targetMonth').addEventListener('input', () => {
        state.monthKey = $('targetMonth').value;
        render();
      });
      $('focusAnimal').addEventListener('input', () => {
        state.focusAnimal = $('focusAnimal').value;
        render();
      });
      $('todayBtn').addEventListener('click', jumpToToday);
      $('copyBtn').addEventListener('click', copySummary);

      $('btnCards').addEventListener('click', () => {
        state.displayMode = 'cards';
        $('btnCards').classList.add('active');
        $('btnTable').classList.remove('active');
        $('results').classList.remove('hidden');
        $('tableSection').classList.add('hidden');
        saveSettings();
      });

      $('btnTable').addEventListener('click', () => {
        state.displayMode = 'table';
        $('btnTable').classList.add('active');
        $('btnCards').classList.remove('active');
        $('results').classList.add('hidden');
        $('tableSection').classList.remove('hidden');
        renderTable();
        saveSettings();
      });

      $('tableBody').addEventListener('click', (event) => {
        const row = event.target.closest('[data-key]');
        if (!row) return;
        const item = items.find((entry) => entry.key === row.dataset.key);
        if (item) openItem(item);
      });

      $('results').addEventListener('click', (event) => {
        const card = event.target.closest('[data-key]');
        if (!card) return;
        const item = items.find((entry) => entry.key === card.dataset.key);
        if (item) openItem(item);
      });
      $('infoPanel').addEventListener('click', (event) => {
        const card = event.target.closest('[data-animal]');
        if (!card) return;
        openAnimal(Number(card.dataset.animal));
      });
      $('sheetClose').addEventListener('click', closeSheet);
      $('sheetOverlay').addEventListener('click', (event) => {
        if (event.target === $('sheetOverlay')) closeSheet();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeSheet();
      });

      $('audioGroup').addEventListener('touchstart', activateAudioGroup, { passive: true });
      $('audioGroup').addEventListener('mouseenter', activateAudioGroup);
      $('toggleMusic').addEventListener('click', toggleMusic);
      $('volToggle').addEventListener('click', () => {
        activateAudioGroup();
        showVolume();
      });
      $('volumeRange').addEventListener('input', (event) => {
        $('bgMusic').volume = Number(event.target.value);
        localStorage.setItem('zodiacMusicVolume', String($('bgMusic').volume));
        showVolume();
      });
      $('bgMusic').addEventListener('ended', playNextMusicTrack);
      $('bgMusic').addEventListener('timeupdate', () => {
        if (!$('bgMusic').paused) saveMusicState();
      });
      window.addEventListener('beforeunload', saveMusicState);
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') saveMusicState();
      });

      $('shareGroup').addEventListener('touchstart', activateShareGroup, { passive: true });
      $('shareGroup').addEventListener('mouseenter', activateShareGroup);
      $('saveImageBtn').addEventListener('click', saveCurrentImage);
      $('shareImageBtn').addEventListener('click', shareCurrentImage);

      const scrollTopBtn = $('scrollTopBtn');
      window.addEventListener('scroll', () => scrollTopBtn.classList.toggle('visible', window.scrollY > 280), { passive: true });
      scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    }

    function initStarfield() {
      const canvas = $('starCanvas');
      const ctx = canvas.getContext('2d');
      const points = Array.from({ length: 90 }, () => ({
        x: Math.random(),
        y: Math.random(),
        r: Math.random() * 1.8 + 0.4,
        s: Math.random() * 0.35 + 0.08
      }));
      function resize() {
        canvas.width = window.innerWidth * devicePixelRatio;
        canvas.height = window.innerHeight * devicePixelRatio;
      }
      function draw(time) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const isDark = document.body.classList.contains('theme-sacred') || document.body.classList.contains('theme-royal');
        if (isDark) {
          points.forEach((p, i) => {
            const alpha = 0.35 + Math.sin(time / 900 + i) * 0.25;
            ctx.fillStyle = `rgba(255, 215, 0, ${alpha})`;
            ctx.beginPath();
            ctx.arc(p.x * canvas.width, ((p.y * canvas.height) + time * p.s) % canvas.height, p.r * devicePixelRatio, 0, Math.PI * 2);
            ctx.fill();
          });
        }
        requestAnimationFrame(draw);
      }
      resize();
      window.addEventListener('resize', resize);
      requestAnimationFrame(draw);
    }

    applyTeacherMode();
    preloadZodiacImages();
    restoreSettings();
    buildItems();
    populateControls();
    bindEvents();
    initMusic();
    initStarfield();
    render();
  </script>
</body>

</html>
