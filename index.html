  🚨 กฎเหล็ก 3 ข้อที่ห้ามละเมิดโดยเด็ดขาด:
  1. 🧮 [ระบบสูตรคำนวณ ห้ามพังเด็ดขาด!]
     ตรรกะการเดินอายุจร การเวียนนักษัตรย้อนทิศทางสำหรับเพศหญิง ตรรกะวันเกิดเริ่มต้นและการสแกน 365 วัน 
     รวมถึงฟังก์ชันคีย์แคช 2 สล็อต (${year}_${gender}) ต้องทำงานได้อย่างถูกต้องแม่นยำ ห้ามดัดแปลงจนสูตรเพี้ยน
  2. 🎨 [จัดรูปแบบโครงสร้าง Layout ให้สวยงามสอดคล้องตามข้อกำหนดเฉพาะของแต่ละไฟล์]
     - ไฟล์ฝั่ง Owner: แสดงผลแท็บควบคุมมุมมอง 4 ปุ่มแบบสมมาตรแนวระนาบเดี่ยวบน Desktop
     - ไฟล์ฝั่ง Teacher และ Public: ซ่อนแท็บ "วันนี้" และ "รายเดือน" และแสดงผลแบบบังคับ 2 ปุ่ม (1fr 1fr)
     - การจัดแนวปุ่ม Stepper และปุ่มลอยรีเซ็ต (↺) ต้องคงความสมดุลกึ่งกลางและลอยตัวสวยงามในทุกสิทธิ์ใช้งาน (ห้ามหล่นบรรทัดล่าง)
  3. 🔌 [ห้ามทำระบบเชื่อมต่อหรือยิง API หา GitHub ส่วนตัวเด็ดขาด!]
     - ห้ามสั่งรันบอตหรือส่งคำขอสแกน (Unauthenticated API requests) ไปยัง api.github.com/repos/... เด็ดขาด
       เพราะระบบรักษาความปลอดภัยของ GitHub จะระงับสิทธิ์ (Suspend) บัญชีผู้ใช้งานทันที!
     - เมื่อทดสอบออฟไลน์โลคอล ให้ทำงานผ่านระบบจำลองออฟไลน์ (Offline Fallback Mock) ในฟังก์ชัน getRunner() เสมอ
     - โฟลเดอร์รูปภาพ chata ต้องใช้ตัวพิมพ์เล็กทั้งหมด (`assets/chata/`) ทั้งหมดในระบบไฟล์และโค้ดเพื่อป้องกันปัญหา 404 บล็อกภาพ
-->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ปีนักษัตรสงกรานต์</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --muted: #666666;
      --accent: #c8951a;
      --border: #333333;
      --surface: #fffbf0;
      --shadow: rgba(0, 0, 0, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans Thai", Tahoma, system-ui, sans-serif;
    }

    main {
      width: min(100%, 440px);
      padding: 22px;
      border: 2px solid var(--accent);
      border-radius: 10px;
      background: var(--surface);
      box-shadow: 0 16px 42px var(--shadow);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 8vw, 40px);
      line-height: 1.25;
      color: var(--text);
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      font-weight: 800;
      line-height: 1.55;
    }

    a {
      width: 100%;
      min-height: 48px;
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #efd085);
      color: #16130d;
      font-size: 18px;
      font-weight: 900;
      text-decoration: none;
    }

    .credit {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <h1>ปีนักษัตรสงกรานต์</h1>
    <p>กำลังเปิดระบบเข้าสู่ระบบ กรุณารอสักครู่</p>
    <a id="openApp" href="#">เปิดระบบ</a>
    <div class="credit">Developed with love by คนโบราณ</div>
  </main>

  <script>
    const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzipqnXKi7K5YE03eg9KBPdw6_1quDGLUz4KzA-KZF95TTyx7dN4RwtkMuwy-SE_uqhrw/exec';

    function targetUrl() {
      const target = new URL(APP_SCRIPT_URL);
      const source = new URL(window.location.href);
      source.searchParams.forEach((value, key) => {
        target.searchParams.set(key, value);
      });
      target.searchParams.set('openExternalBrowser', target.searchParams.get('openExternalBrowser') || '1');
      return target.toString();
    }

    const appUrl = targetUrl();
    const openApp = document.getElementById('openApp');
    openApp.href = appUrl;
    window.location.replace(appUrl);
  </script>
</body>
</html>
